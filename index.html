<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Longmen">
    <title>Longmen — Chinesisch-Sprachsimulation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            background: #1a1a1a;
            color: #d4c8a8;
            font-family: 'Courier New', 'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', monospace;
            overflow: hidden;
            height: 100%;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            overscroll-behavior: none;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        #header {
            background: #111;
            border-bottom: 2px solid #4a2020;
            padding: 6px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 44px;
            flex-shrink: 0;
        }
        #header h1 {
            font-size: 14px;
            color: #d4a030;
            letter-spacing: 1px;
            white-space: nowrap;
        }
        #controls {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        #controls button {
            background: #2a2420;
            border: 1px solid #4a3e30;
            color: #d4a030;
            min-width: 44px;
            min-height: 44px;
            padding: 4px 10px;
            font-family: 'Courier New', 'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', monospace;
            font-size: 14px;
            cursor: pointer;
            border-radius: 4px;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        #controls button:hover { background: #3a3226; }
        #controls button:active { background: #4a3e30; }
        #controls button.active {
            background: #4a3e30;
            border-color: #d4a030;
            color: #fff;
        }
        #time-display {
            color: #8a7e6a;
            font-size: 12px;
            margin-left: 8px;
            white-space: nowrap;
        }
        #main {
            display: flex;
            flex: 1;
            overflow: hidden;
            min-height: 0;
        }
        #canvas-wrap {
            flex: 1;
            position: relative;
            background: #2d2d1a;
            min-width: 0;
            min-height: 0;
        }
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
        }
        #panel {
            width: 300px;
            background: #1e1a14;
            border-left: 2px solid #3a3226;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 0;
            font-size: 12px;
            flex-shrink: 0;
        }
        #panel-toggle {
            display: none;
            position: fixed;
            bottom: 12px;
            right: 12px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #3a3226;
            border: 2px solid #d4a030;
            color: #d4a030;
            font-size: 20px;
            z-index: 100;
            cursor: pointer;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            align-items: center;
            justify-content: center;
        }
        /* Portrait / narrow screens: stack vertically */
        @media (max-width: 800px), (orientation: portrait) {
            #main {
                flex-direction: column;
            }
            #panel {
                width: 100%;
                border-left: none;
                border-top: 2px solid #3a3226;
                max-height: 45%;
                display: none;
            }
            #panel.open {
                display: block;
            }
            #panel-toggle {
                display: flex;
            }
            #header h1 {
                font-size: 11px;
                letter-spacing: 0;
            }
        }
        /* Very small screens */
        @media (max-width: 500px) {
            #header { padding: 4px 8px; min-height: 40px; }
            #controls button { min-width: 38px; min-height: 38px; font-size: 12px; }
            #time-display { font-size: 10px; margin-left: 4px; }
        }
        .panel-section {
            border-bottom: 1px solid #2a2420;
            padding: 10px 12px;
        }
        .panel-section h2 {
            font-size: 12px;
            color: #d4a030;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .char-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .char-portrait {
            width: 40px;
            height: 40px;
            border-radius: 4px;
            border: 2px solid #4a3e30;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .char-name {
            font-size: 14px;
            color: #e0d8c0;
            font-weight: bold;
        }
        .char-role {
            font-size: 10px;
            color: #8a7e6a;
        }
        .stat-row {
            display: flex;
            align-items: center;
            margin: 3px 0;
            gap: 6px;
        }
        .stat-label {
            width: 75px;
            color: #8a7e6a;
            font-size: 11px;
        }
        .stat-bar-bg {
            flex: 1;
            height: 8px;
            background: #0a0a08;
            border-radius: 2px;
            overflow: hidden;
        }
        .stat-bar {
            height: 100%;
            border-radius: 2px;
            transition: width 0.3s;
        }
        .stat-val {
            width: 24px;
            text-align: right;
            font-size: 10px;
            color: #8a7e6a;
        }
        .activity {
            color: #a0a080;
            font-size: 11px;
            font-style: italic;
            margin-top: 4px;
        }
        .need-row {
            display: flex;
            align-items: center;
            margin: 2px 0;
            gap: 6px;
        }
        .need-label {
            width: 55px;
            color: #8a7e6a;
            font-size: 10px;
        }
        .need-bar-bg {
            flex: 1;
            height: 6px;
            background: #0a0a08;
            border-radius: 2px;

        }
        .need-bar {
            height: 100%;
            border-radius: 2px;

        .vocab-list {
            max-height: 200px;

        .vocab-word {

        }

            overflow-y: auto;
            -webkit-overflow-scrolling: touch;

        .log-entry.learn { color: #6a8a5a; }
        .log-entry.speak { color: #a0a080; }

</head>
<body>
    <div id="header">
        <h1>LONGMEN 龙门 — CHINESISCH-SPRACHSIMULATION</h1>
        <div id="controls">
            <button id="btn-pause" onclick="setSpeed(0)">II</button>
            <button id="btn-1x" class="active" onclick="setSpeed(1)">1x</button>
            <button id="btn-2x" onclick="setSpeed(2)">2x</button>
            <button id="btn-3x" onclick="setSpeed(3)">3x</button>
            <button id="btn-sound" onclick="toggleSound()">♪</button>
            <span id="time-display">Tag 1 — 06:00</span>
        </div>
    </div>
    <button id="panel-toggle" onclick="togglePanel()">i</button>
    <div id="main">
        <div id="canvas-wrap">
            <canvas id="gameCanvas"></canvas>
        </div>
        <div id="panel">
            <div id="char1-panel" class="panel-section"></div>
            <div id="char2-panel" class="panel-section"></div>
            <div id="vocab-panel" class="panel-section">
                <h2>Vokabular</h2>
                <div class="progress-text" id="vocab-progress">0 / 0 Wörter gelernt</div>
                <div class="progress-bar-bg"><div class="progress-bar" id="vocab-bar" style="width:0%"></div></div>
                <div class="vocab-list" id="vocab-list"></div>
            </div>
            <div class="panel-section">
                <h2>Ereignisse</h2>
                <div id="event-log"></div>
            </div>
        </div>
    </div>

    <script>
    // ============================================================
    //  CONFIGURATION
    // ============================================================
    const WORLD_W = 900;
    const WORLD_H = 640;
    const HEARING_RANGE = 180; // base reference; actual range is per-learner via wahrnehmung
    const TICK_MS = 16;
    const SPEAKER_NAMES = ["明","兰","伟","芳","强","秀","志","玉","建","莲","军","慧","东","雪","海","丽"];
    const LEARNER_NAMES = ["Hans","Lena","Fritz","Greta","Karl","Anna","Otto","Helga","Klaus","Ingrid","Max","Elsa"];
    const NPC_NAMES = ["德","林","华","英","国","春","文","红","平","荣","光","清","福","寿","康","宝"];

    // ============================================================
    //  AUDIO ENGINE (Web Audio API — procedural Chinese soundtrack)
    //  Instruments: dizi (竹笛), guzheng (古筝), erhu (二胡),
    //  Chinese percussion (木鱼 muyu, 锣 luo, 磬 qing, 梆子 bangzi)
    // ============================================================
    let audioCtx = null;
    let audioMaster = null;
    let soundEnabled = true;
    let audioStarted = false;
    let musicPlaying = false;
    let musicNodes = [];

    function ensureAudio() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        audioMaster = audioCtx.createGain();
        audioMaster.gain.value = 0.5;
        audioMaster.connect(audioCtx.destination);
    }

    function resumeAudio() {
        if (!audioCtx) ensureAudio();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        if (!audioStarted) {
            audioStarted = true;
            startChineseMusic();
        }
    }

    // Start audio on first user interaction (autoplay policy)
    ['click','touchstart','keydown'].forEach(evt => {
        document.addEventListener(evt, resumeAudio, { once: false, passive: true });
    });

    function toggleSound() {
        soundEnabled = !soundEnabled;
        const btn = document.getElementById('btn-sound');
        btn.textContent = soundEnabled ? '♪' : '♪̶';
        btn.classList.toggle('active', soundEnabled);
        if (audioMaster) audioMaster.gain.value = soundEnabled ? 0.5 : 0;
        if (soundEnabled) resumeAudio();
    }

    // --- Utility: create noise buffer ---
    function createNoiseBuffer(duration) {
        const len = audioCtx.sampleRate * duration;
        const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
        return buf;
    }

    // --- ADAPTIVE MOOD-BASED CHINESE MUSIC ENGINE ---
    // Detects time-of-day + weather and smoothly transitions between musical moods
    // Uses authentic Chinese pentatonic modes and instrument simulations

    // Mood definitions: each mood configures all music layers
    // Chinese pentatonic modes: 宫 gōng (C D E G A), 商 shāng (D E G A C),
    // 角 jué (E G A C D), 徵 zhǐ (G A C D E), 羽 yǔ (A C D E G)
    const MUSIC_MOODS = {
        day: {
            bpm: 52, droneFreq: 65.4, droneDetune: 0.15, droneVol: 0.06, droneFilter: 200,
            // 宫 gōng mode — bright, pastoral, like a village marketplace
            scale: [261.6, 293.7, 329.6, 392, 440, 523.3, 587.3],
            diziVol: 0.22, diziInterval: [5, 10], noteDur: [0.3, 1.2], noteCount: [3, 6],
            guzhengVol: 0.18, guzhengInterval: [3, 7], guzhengNotes: [3, 6],
            erhuVol: 0.0, erhuInterval: [20, 40], erhuDur: [0, 0],
            percVol: 0.20, percPattern: 'village', bangziVol: 0.08,
            ambVol: 0.04, ambFreq: 400, ambQ: 0.3, ambLfoRate: 0.10, ambLfoDepth: 0.02,
        },
        dawn: {
            bpm: 40, droneFreq: 82.4, droneDetune: 0.1, droneVol: 0.05, droneFilter: 160,
            // 角 jué mode — serene, like morning mist over mountains
            scale: [329.6, 392, 440, 523.3, 587.3, 659.3],
            diziVol: 0.26, diziInterval: [8, 16], noteDur: [0.8, 2.0], noteCount: [2, 4],
            guzhengVol: 0.14, guzhengInterval: [6, 14], guzhengNotes: [2, 4],
            erhuVol: 0.0, erhuInterval: [30, 50], erhuDur: [0, 0],
            percVol: 0.0, percPattern: 'none', bangziVol: 0.0,
            ambVol: 0.06, ambFreq: 500, ambQ: 0.2, ambLfoRate: 0.05, ambLfoDepth: 0.02,
        },
        dusk: {
            bpm: 44, droneFreq: 55, droneDetune: 0.25, droneVol: 0.08, droneFilter: 140,
            // 羽 yǔ mode — melancholic, contemplative evening
            scale: [220, 261.6, 293.7, 329.6, 392, 440],
            diziVol: 0.20, diziInterval: [7, 15], noteDur: [0.8, 2.0], noteCount: [2, 4],
            guzhengVol: 0.16, guzhengInterval: [5, 10], guzhengNotes: [2, 5],
            erhuVol: 0.16, erhuInterval: [10, 20], erhuDur: [2.0, 4.5],
            percVol: 0.08, percPattern: 'temple', bangziVol: 0.0,
            ambVol: 0.05, ambFreq: 300, ambQ: 0.4, ambLfoRate: 0.07, ambLfoDepth: 0.02,
        },
        night: {
            bpm: 32, droneFreq: 55, droneDetune: 0.15, droneVol: 0.08, droneFilter: 100,
            // 羽 yǔ mode sparse — guqin-like contemplative night
            scale: [220, 261.6, 329.6, 392, 440],
            diziVol: 0.0, diziInterval: [20, 40], noteDur: [1.5, 3.0], noteCount: [1, 2],
            guzhengVol: 0.12, guzhengInterval: [8, 18], guzhengNotes: [1, 3],
            erhuVol: 0.14, erhuInterval: [12, 25], erhuDur: [3.0, 6.0],
            percVol: 0.0, percPattern: 'none', bangziVol: 0.0,
            ambVol: 0.05, ambFreq: 200, ambQ: 0.5, ambLfoRate: 0.03, ambLfoDepth: 0.03,
        },
        rain: {
            bpm: 46, droneFreq: 61.7, droneDetune: 0.35, droneVol: 0.07, droneFilter: 130,
            // 商 shāng mode — wistful rain on bamboo leaves
            scale: [293.7, 329.6, 392, 440, 523.3],
            diziVol: 0.16, diziInterval: [8, 18], noteDur: [0.6, 1.8], noteCount: [2, 4],
            guzhengVol: 0.20, guzhengInterval: [4, 8], guzhengNotes: [3, 6],
            erhuVol: 0.12, erhuInterval: [14, 28], erhuDur: [2.0, 4.0],
            percVol: 0.06, percPattern: 'rain', bangziVol: 0.12,
            ambVol: 0.07, ambFreq: 700, ambQ: 0.2, ambLfoRate: 0.20, ambLfoDepth: 0.05,
        },
        snow: {
            bpm: 30, droneFreq: 82.4, droneDetune: 0.1, droneVol: 0.06, droneFilter: 90,
            // High crystalline pentatonic — jade bells in snowfall
            scale: [523.3, 587.3, 659.3, 784, 880],
            diziVol: 0.14, diziInterval: [14, 28], noteDur: [1.5, 3.5], noteCount: [1, 2],
            guzhengVol: 0.16, guzhengInterval: [10, 22], guzhengNotes: [1, 3],
            erhuVol: 0.10, erhuInterval: [18, 35], erhuDur: [3.0, 5.0],
            percVol: 0.0, percPattern: 'none', bangziVol: 0.0,
            ambVol: 0.04, ambFreq: 280, ambQ: 0.6, ambLfoRate: 0.03, ambLfoDepth: 0.02,
        },
        fog: {
            bpm: 36, droneFreq: 55, droneDetune: 0.4, droneVol: 0.10, droneFilter: 100,
            // Sparse, mysterious — like a Daoist temple in mist
            scale: [220, 261.6, 329.6, 392, 440],
            diziVol: 0.10, diziInterval: [16, 30], noteDur: [2.0, 4.0], noteCount: [1, 2],
            guzhengVol: 0.10, guzhengInterval: [12, 24], guzhengNotes: [1, 2],
            erhuVol: 0.12, erhuInterval: [15, 30], erhuDur: [3.0, 6.0],
            percVol: 0.04, percPattern: 'temple', bangziVol: 0.0,
            ambVol: 0.07, ambFreq: 180, ambQ: 0.8, ambLfoRate: 0.04, ambLfoDepth: 0.05,
        },
        wind: {
            bpm: 50, droneFreq: 65.4, droneDetune: 0.35, droneVol: 0.04, droneFilter: 160,
            // 徵 zhǐ mode — windswept, energetic
            scale: [392, 440, 523.3, 587.3, 659.3],
            diziVol: 0.12, diziInterval: [6, 14], noteDur: [0.2, 0.6], noteCount: [3, 5],
            guzhengVol: 0.14, guzhengInterval: [4, 9], guzhengNotes: [3, 5],
            erhuVol: 0.0, erhuInterval: [20, 40], erhuDur: [0, 0],
            percVol: 0.10, percPattern: 'wind', bangziVol: 0.10,
            ambVol: 0.05, ambFreq: 450, ambQ: 0.15, ambLfoRate: 0.30, ambLfoDepth: 0.07,
        },
        storm: {
            bpm: 60, droneFreq: 49, droneDetune: 0.7, droneVol: 0.12, droneFilter: 220,
            // Low intense — thunderous, dramatic like Beijing opera percussion
            scale: [196, 220, 261.6, 293.7, 392],
            diziVol: 0.06, diziInterval: [5, 10], noteDur: [0.15, 0.4], noteCount: [3, 6],
            guzhengVol: 0.10, guzhengInterval: [3, 6], guzhengNotes: [4, 8],
            erhuVol: 0.0, erhuInterval: [20, 40], erhuDur: [0, 0],
            percVol: 0.45, percPattern: 'opera', bangziVol: 0.15,
            ambVol: 0.08, ambFreq: 550, ambQ: 0.1, ambLfoRate: 0.45, ambLfoDepth: 0.09,
        },
    };

    let currentMood = 'day';
    let musicGainNode = null;
    // Adaptive nodes we can tweak at runtime
    let droneOsc1 = null, droneOsc2 = null, droneFilt = null, droneGainNode = null, droneLfo = null;
    let ambNoiseNode = null, ambFiltNode = null, ambGainNode = null, ambLfo = null, ambLfoGain = null;
    let diziGainNode = null;
    let guzhengGainNode = null;
    let erhuGainNode = null;
    let activeMoodParams = null;

    function getMusicMood() {
        const h = gameHour;
        // Weather overrides (stronger weather = stronger mood)
        if (currentWeather !== 'clear' && weatherIntensity > 0.25) {
            if (currentWeather === 'rain' && weatherIntensity > 0.7) return 'storm';
            if (currentWeather === 'wind' && weatherIntensity > 0.7) return 'storm';
            if (currentWeather === 'rain') return 'rain';
            if (currentWeather === 'snow') return 'snow';
            if (currentWeather === 'fog') return 'fog';
            if (currentWeather === 'wind') return 'wind';
        }
        // Time of day
        if (h >= 21 || h < 4) return 'night';
        if (h >= 4 && h < 6) return 'dawn';
        if (h >= 18 && h < 21) return 'dusk';
        return 'day';
    }

    function startChineseMusic() {
        if (musicPlaying || !audioCtx) return;
        musicPlaying = true;

        currentMood = getMusicMood();
        activeMoodParams = { ...MUSIC_MOODS[currentMood] };

        // Master music gain
        musicGainNode = audioCtx.createGain();
        musicGainNode.gain.value = 0.20;
        musicGainNode.connect(audioMaster);
        musicNodes.push(musicGainNode);

        // Start all Chinese instrument layers
        startAdaptiveDrone(musicGainNode);
        startChinesePercussion(musicGainNode);
        startDizi(musicGainNode);
        startGuzheng(musicGainNode);
        startErhu(musicGainNode);
        startAdaptiveAmbient(musicGainNode);

        // Mood check loop
        scheduleMoodCheck();
    }

    function scheduleMoodCheck() {
        if (!musicPlaying) return;
        const newMood = getMusicMood();
        if (newMood !== currentMood) {
            currentMood = newMood;
            transitionToMood(MUSIC_MOODS[newMood]);
        }
        setTimeout(scheduleMoodCheck, 2000);
    }

    function transitionToMood(m) {
        activeMoodParams = { ...m };
        const t = audioCtx.currentTime;
        const fade = 3.5; // seconds to cross-fade

        // Drone
        if (droneOsc1) {
            droneOsc1.frequency.linearRampToValueAtTime(m.droneFreq, t + fade);
            droneOsc2.frequency.linearRampToValueAtTime(m.droneFreq * 1.5, t + fade); // perfect 5th
            droneFilt.frequency.linearRampToValueAtTime(m.droneFilter, t + fade);
            droneGainNode.gain.linearRampToValueAtTime(m.droneVol, t + fade);
        }

        // Ambient
        if (ambFiltNode) {
            ambFiltNode.frequency.linearRampToValueAtTime(m.ambFreq, t + fade);
            ambFiltNode.Q.linearRampToValueAtTime(m.ambQ, t + fade);
            ambGainNode.gain.linearRampToValueAtTime(m.ambVol, t + fade);
            if (ambLfo) ambLfo.frequency.linearRampToValueAtTime(m.ambLfoRate, t + fade);
            if (ambLfoGain) ambLfoGain.gain.linearRampToValueAtTime(m.ambLfoDepth, t + fade);
        }

        // Dizi volume
        if (diziGainNode) {
            diziGainNode.gain.linearRampToValueAtTime(m.diziVol, t + fade);
        }
        // Guzheng volume
        if (guzhengGainNode) {
            guzhengGainNode.gain.linearRampToValueAtTime(m.guzhengVol, t + fade);
        }
        // Erhu volume
        if (erhuGainNode) {
            erhuGainNode.gain.linearRampToValueAtTime(m.erhuVol, t + fade);
        }
    }

    // === ADAPTIVE DRONE (古琴 guqin-style open strings) ===
    // Uses perfect 5th intervals characteristic of Chinese music
    function startAdaptiveDrone(dest) {
        const m = activeMoodParams;
        droneGainNode = audioCtx.createGain();
        droneGainNode.gain.value = m.droneVol;
        droneGainNode.connect(dest);

        // Root tone — warm sine, like an open guqin string
        droneOsc1 = audioCtx.createOscillator();
        droneOsc1.type = 'sine';
        droneOsc1.frequency.value = m.droneFreq;
        droneFilt = audioCtx.createBiquadFilter();
        droneFilt.type = 'lowpass';
        droneFilt.frequency.value = m.droneFilter;
        droneFilt.Q.value = 1.5;
        droneOsc1.connect(droneFilt);
        droneFilt.connect(droneGainNode);
        droneOsc1.start();
        musicNodes.push(droneOsc1);

        // Perfect 5th above — characteristic Chinese interval
        droneOsc2 = audioCtx.createOscillator();
        droneOsc2.type = 'triangle';
        droneOsc2.frequency.value = m.droneFreq * 1.5; // perfect 5th
        const filt2 = audioCtx.createBiquadFilter();
        filt2.type = 'lowpass';
        filt2.frequency.value = m.droneFilter * 0.7;
        filt2.Q.value = 1;
        const droneGain2 = audioCtx.createGain();
        droneGain2.gain.value = 0.4; // softer 5th
        droneOsc2.connect(filt2);
        filt2.connect(droneGain2);
        droneGain2.connect(droneGainNode);
        droneOsc2.start();
        musicNodes.push(droneOsc2);

        // Slow LFO for breathing quality (like guqin vibrato 吟)
        droneLfo = audioCtx.createOscillator();
        droneLfo.type = 'sine';
        droneLfo.frequency.value = 0.06; // very slow breathing
        const lfoG = audioCtx.createGain();
        lfoG.gain.value = 30;
        droneLfo.connect(lfoG);
        lfoG.connect(droneFilt.frequency);
        droneLfo.start();
        musicNodes.push(droneLfo);
    }

    // === CHINESE PERCUSSION (木鱼 muyu, 锣 luo, 磬 qing, 梆子 bangzi, 鼓 gu) ===
    function startChinesePercussion(dest) {
        const percDest = audioCtx.createGain();
        percDest.gain.value = 1.0;
        percDest.connect(dest);
        musicNodes.push(percDest);
        schedulePercLoop(percDest);
    }

    function schedulePercLoop(dest) {
        if (!audioCtx || !soundEnabled || !musicPlaying) { setTimeout(() => schedulePercLoop(dest), 1000); return; }

        const m = activeMoodParams;
        const now = audioCtx.currentTime;
        const bpm = m.bpm;
        const beat = 60 / bpm;
        const barLen = beat * 4;
        const bars = 4;

        for (let bar = 0; bar < bars; bar++) {
            const bs = now + bar * barLen;

            if (m.percPattern === 'none') continue;

            if (m.percPattern === 'village') {
                // Lively village: muyu on beats, bangzi accents, occasional small gong
                playMuyu(bs, dest, m.percVol);
                playMuyu(bs + beat * 2, dest, m.percVol);
                if (Math.random() < 0.4) playMuyu(bs + beat, dest, m.percVol * 0.5);
                if (Math.random() < 0.3) playMuyu(bs + beat * 3, dest, m.percVol * 0.5);
                playBangzi(bs + beat, dest, m.bangziVol);
                playBangzi(bs + beat * 3, dest, m.bangziVol);
                // Occasional small gong on downbeat
                if (Math.random() < 0.15) playLuo(bs, dest, m.percVol * 0.3, 'small');
                // Gu (drum) on 1 and 3 softly
                playGu(bs, dest, m.percVol * 0.4);
                if (Math.random() < 0.6) playGu(bs + beat * 2, dest, m.percVol * 0.3);
                // Fill every 4th bar
                if (bar % 4 === 3 && Math.random() < 0.4) {
                    playBangzi(bs + beat * 3.5, dest, m.bangziVol * 0.7);
                    playMuyu(bs + beat * 3.25, dest, m.percVol * 0.4);
                    playMuyu(bs + beat * 3.75, dest, m.percVol * 0.4);
                }
            } else if (m.percPattern === 'temple') {
                // Contemplative: sparse muyu, occasional qing (temple bell)
                if (Math.random() < 0.5) playMuyu(bs, dest, m.percVol);
                if (Math.random() < 0.2) playMuyu(bs + beat * 2, dest, m.percVol * 0.4);
                // Temple bell (qing) every few bars
                if (bar % 4 === 0 && Math.random() < 0.4) playQing(bs, dest, m.percVol * 0.5);
            } else if (m.percPattern === 'rain') {
                // Rain on bamboo: gentle bangzi like raindrops, sparse muyu
                if (Math.random() < 0.4) playMuyu(bs, dest, m.percVol * 0.5);
                for (let i = 0; i < 8; i++) {
                    if (Math.random() < 0.35) playBangzi(bs + i * beat * 0.5, dest, m.bangziVol * randFloat(0.3, 1.0));
                }
                if (bar % 4 === 0 && Math.random() < 0.3) playQing(bs, dest, m.percVol * 0.3);
            } else if (m.percPattern === 'wind') {
                // Driving wind: faster bangzi, energetic gu
                playGu(bs, dest, m.percVol * 0.5);
                playGu(bs + beat * 2, dest, m.percVol * 0.4);
                if (Math.random() < 0.4) playGu(bs + beat * 1.5, dest, m.percVol * 0.25);
                playBangzi(bs + beat, dest, m.bangziVol);
                playBangzi(bs + beat * 3, dest, m.bangziVol);
                for (let i = 0; i < 4; i++) {
                    if (Math.random() < 0.3) playBangzi(bs + i * beat + beat * 0.5, dest, m.bangziVol * 0.5);
                }
            } else if (m.percPattern === 'opera') {
                // Beijing opera style: dramatic gong, rapid bangzi, heavy gu
                playGu(bs, dest, m.percVol);
                playGu(bs + beat, dest, m.percVol * 0.7);
                playGu(bs + beat * 2, dest, m.percVol * 0.9);
                playGu(bs + beat * 3, dest, m.percVol * 0.6);
                playLuo(bs, dest, m.percVol * 0.5, 'large');
                if (Math.random() < 0.5) playLuo(bs + beat * 2, dest, m.percVol * 0.3, 'small');
                for (let i = 0; i < 8; i++) playBangzi(bs + i * beat * 0.5, dest, m.bangziVol * (i % 2 === 0 ? 1.0 : 0.6));
                // Dramatic gong crash
                if (Math.random() < 0.2) {
                    playLuo(bs + beat * 3.5, dest, m.percVol * 0.7, 'large');
                }
                // Rapid fill
                if (bar % 4 === 3 && Math.random() < 0.5) {
                    for (let j = 0; j < 6; j++) playGu(bs + beat * 3 + j * 0.08, dest, m.percVol * (0.4 + j * 0.1));
                }
            }
        }

        setTimeout(() => schedulePercLoop(dest), (barLen * bars - 0.2) * 1000);
    }

    // 木鱼 Muyu — wooden fish block (hollow, warm click)
    function playMuyu(time, dest, vol) {
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(vol || 0.3, time);
        g.gain.exponentialRampToValueAtTime(0.001, time + 0.12);
        g.connect(dest);
        // Tuned wooden resonance
        const osc = audioCtx.createOscillator();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(800 + Math.random() * 100, time);
        osc.frequency.exponentialRampToValueAtTime(400, time + 0.08);
        const filt = audioCtx.createBiquadFilter();
        filt.type = 'bandpass';
        filt.frequency.value = 1200;
        filt.Q.value = 3;
        osc.connect(filt);
        filt.connect(g);
        osc.start(time);
        osc.stop(time + 0.12);
        // Click transient
        const ng = audioCtx.createGain();
        ng.gain.setValueAtTime(0.4 * (vol || 0.3), time);
        ng.gain.exponentialRampToValueAtTime(0.001, time + 0.02);
        const nf = audioCtx.createBiquadFilter();
        nf.type = 'bandpass';
        nf.frequency.value = 3000;
        nf.Q.value = 2;
        nf.connect(ng);
        ng.connect(dest);
        const ns = audioCtx.createBufferSource();
        ns.buffer = createNoiseBuffer(0.02);
        ns.connect(nf);
        ns.start(time);
        ns.stop(time + 0.02);
    }

    // 梆子 Bangzi — wooden clapper (bright, sharp)
    function playBangzi(time, dest, vol) {
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(vol || 0.15, time);
        g.gain.exponentialRampToValueAtTime(0.001, time + 0.05);
        g.connect(dest);
        const osc = audioCtx.createOscillator();
        osc.type = 'square';
        osc.frequency.setValueAtTime(1800 + Math.random() * 200, time);
        osc.frequency.exponentialRampToValueAtTime(1200, time + 0.03);
        const filt = audioCtx.createBiquadFilter();
        filt.type = 'bandpass';
        filt.frequency.value = 2500;
        filt.Q.value = 4;
        osc.connect(filt);
        filt.connect(g);
        osc.start(time);
        osc.stop(time + 0.05);
    }

    // 锣 Luo — gong (metallic shimmer with pitch bend)
    function playLuo(time, dest, vol, size) {
        const isLarge = size === 'large';
        const baseFreq = isLarge ? 120 : 380;
        const dur = isLarge ? 1.5 : 0.8;
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(vol || 0.4, time);
        g.gain.exponentialRampToValueAtTime(0.001, time + dur);
        g.connect(dest);
        // Main tone with characteristic pitch bend (锣 bends down)
        const osc = audioCtx.createOscillator();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(baseFreq * 1.15, time);
        osc.frequency.exponentialRampToValueAtTime(baseFreq, time + 0.3);
        osc.connect(g);
        osc.start(time);
        osc.stop(time + dur);
        // Metallic overtones
        const osc2 = audioCtx.createOscillator();
        osc2.type = 'sine';
        osc2.frequency.setValueAtTime(baseFreq * 2.76, time);
        osc2.frequency.exponentialRampToValueAtTime(baseFreq * 2.4, time + 0.2);
        const g2 = audioCtx.createGain();
        g2.gain.setValueAtTime((vol || 0.4) * 0.3, time);
        g2.gain.exponentialRampToValueAtTime(0.001, time + dur * 0.7);
        osc2.connect(g2);
        g2.connect(dest);
        osc2.start(time);
        osc2.stop(time + dur * 0.7);
        // Shimmer noise
        const ng = audioCtx.createGain();
        ng.gain.setValueAtTime((vol || 0.4) * 0.15, time);
        ng.gain.exponentialRampToValueAtTime(0.001, time + dur * 0.4);
        const nf = audioCtx.createBiquadFilter();
        nf.type = 'bandpass';
        nf.frequency.value = baseFreq * 4;
        nf.Q.value = 2;
        nf.connect(ng);
        ng.connect(dest);
        const ns = audioCtx.createBufferSource();
        ns.buffer = createNoiseBuffer(dur * 0.4);
        ns.connect(nf);
        ns.start(time);
        ns.stop(time + dur * 0.4);
    }

    // 磬 Qing — temple bell/chime (pure, resonant, long decay)
    function playQing(time, dest, vol) {
        const freq = 1046.5 + Math.random() * 200; // high C area
        const dur = 3.0;
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(vol || 0.3, time);
        g.gain.setValueAtTime((vol || 0.3) * 0.8, time + 0.01);
        g.gain.exponentialRampToValueAtTime(0.001, time + dur);
        g.connect(dest);
        const osc = audioCtx.createOscillator();
        osc.type = 'sine';
        osc.frequency.value = freq;
        osc.connect(g);
        osc.start(time);
        osc.stop(time + dur);
        // Overtone
        const osc2 = audioCtx.createOscillator();
        osc2.type = 'sine';
        osc2.frequency.value = freq * 2.5;
        const g2 = audioCtx.createGain();
        g2.gain.setValueAtTime((vol || 0.3) * 0.15, time);
        g2.gain.exponentialRampToValueAtTime(0.001, time + dur * 0.5);
        osc2.connect(g2);
        g2.connect(dest);
        osc2.start(time);
        osc2.stop(time + dur * 0.5);
    }

    // 鼓 Gu — Chinese drum (deeper, warmer than Western kick)
    function playGu(time, dest, vol) {
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(vol || 0.5, time);
        g.gain.exponentialRampToValueAtTime(0.001, time + 0.35);
        g.connect(dest);
        const osc = audioCtx.createOscillator();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(100, time);
        osc.frequency.exponentialRampToValueAtTime(50, time + 0.2);
        osc.connect(g);
        osc.start(time);
        osc.stop(time + 0.35);
        // Skin slap
        const ng = audioCtx.createGain();
        ng.gain.setValueAtTime(0.25 * (vol || 0.5), time);
        ng.gain.exponentialRampToValueAtTime(0.001, time + 0.04);
        const filt = audioCtx.createBiquadFilter();
        filt.type = 'bandpass';
        filt.frequency.value = 400;
        filt.Q.value = 1;
        filt.connect(ng);
        ng.connect(dest);
        const ns = audioCtx.createBufferSource();
        ns.buffer = createNoiseBuffer(0.04);
        ns.connect(filt);
        ns.start(time);
        ns.stop(time + 0.04);
    }

    // === 竹笛 DIZI (Chinese bamboo flute) ===
    // Characterized by bright tone, wide vibrato, ornamental grace notes,
    // and buzzing membrane (膜 mó) resonance
    function startDizi(dest) {
        diziGainNode = audioCtx.createGain();
        diziGainNode.gain.value = activeMoodParams.diziVol;
        diziGainNode.connect(dest);
        musicNodes.push(diziGainNode);

        let lastNoteIdx = -1;

        function playDiziPhrase() {
            if (!audioCtx || !musicPlaying) return;
            const m = activeMoodParams;
            if (m.diziVol <= 0) { setTimeout(playDiziPhrase, 5000); return; }
            const scale = m.scale;
            const now = audioCtx.currentTime;
            const noteCount = randInt(m.noteCount[0], m.noteCount[1]);
            let t = now + randFloat(0.1, 0.4);

            // Chinese melodic contours: often start high and descend, or ascend to a peak
            const contours = ['asc', 'desc', 'arch', 'valley', 'step_down', 'random'];
            const contour = randEl(contours);

            for (let i = 0; i < noteCount; i++) {
                let noteIdx;
                if (contour === 'asc') {
                    noteIdx = Math.min(scale.length - 1, Math.floor((i / noteCount) * scale.length));
                } else if (contour === 'desc') {
                    noteIdx = Math.max(0, Math.floor(((noteCount - 1 - i) / noteCount) * scale.length));
                } else if (contour === 'arch') {
                    const pos = i / (noteCount - 1 || 1);
                    noteIdx = Math.floor((1 - Math.abs(pos * 2 - 1)) * (scale.length - 1));
                } else if (contour === 'valley') {
                    const pos = i / (noteCount - 1 || 1);
                    noteIdx = Math.floor(Math.abs(pos * 2 - 1) * (scale.length - 1));
                } else if (contour === 'step_down') {
                    // Characteristic Chinese descending pattern with repeated notes
                    noteIdx = Math.max(0, scale.length - 1 - Math.floor(i / 2));
                } else {
                    do { noteIdx = randInt(0, scale.length - 1); } while (noteIdx === lastNoteIdx && scale.length > 2);
                }
                noteIdx = Math.max(0, Math.min(scale.length - 1, noteIdx + randInt(-1, 1)));
                lastNoteIdx = noteIdx;

                const freq = scale[noteIdx];
                const dur = randFloat(m.noteDur[0], m.noteDur[1]);

                // 倚音 yǐyīn — grace note (very common in dizi playing)
                if (i > 0 && Math.random() < 0.35) {
                    const graceIdx = Math.max(0, noteIdx + randEl([-1, 1, -2]));
                    const graceFreq = scale[Math.min(scale.length - 1, Math.max(0, graceIdx))];
                    playDiziNote(t, graceFreq, 0.06, diziGainNode, 0.3);
                    t += 0.07;
                }

                // 滑音 huáyīn — pitch slide between notes (30% chance)
                const slideFrom = (i > 0 && Math.random() < 0.3) ? freq * randFloat(0.92, 1.08) : freq;
                playDiziNote(t, freq, dur, diziGainNode, 0.5, slideFrom);
                t += dur + randFloat(0.05, 0.2);
            }

            // Long sustained note with wide vibrato (历音 lìyīn)
            if (Math.random() < 0.3) {
                const holdFreq = scale[randInt(0, 2)];
                const holdDur = randFloat(2.0, 4.0);
                t += randFloat(0.3, 0.6);
                playDiziNote(t, holdFreq, holdDur, diziGainNode, 0.35, null, true);
            }

            const nextDelay = randFloat(m.diziInterval[0], m.diziInterval[1]) * 1000;
            setTimeout(playDiziPhrase, nextDelay);
        }

        setTimeout(playDiziPhrase, 3000);
    }

    function playDiziNote(t, freq, dur, dest, vol, slideFrom, wideVibrato) {
        const noteGain = audioCtx.createGain();
        noteGain.gain.setValueAtTime(0, t);
        noteGain.gain.linearRampToValueAtTime(vol, t + 0.03);
        noteGain.gain.setValueAtTime(vol * 0.9, t + dur * 0.5);
        noteGain.gain.linearRampToValueAtTime(0, t + dur);
        noteGain.connect(dest);

        // Main tone — brighter than a Western flute
        const osc = audioCtx.createOscillator();
        osc.type = 'sine';
        if (slideFrom && slideFrom !== freq) {
            osc.frequency.setValueAtTime(slideFrom, t);
            osc.frequency.linearRampToValueAtTime(freq, t + 0.08);
        } else {
            osc.frequency.value = freq;
        }

        // 膜振动 mó zhèndòng — membrane buzzing (characteristic dizi sound)
        // Simulated with a slightly detuned overtone
        const buzzOsc = audioCtx.createOscillator();
        buzzOsc.type = 'sine';
        buzzOsc.frequency.value = freq * 2.01; // slightly detuned 2nd harmonic
        const buzzGain = audioCtx.createGain();
        buzzGain.gain.setValueAtTime(0, t);
        buzzGain.gain.linearRampToValueAtTime(vol * 0.12, t + 0.03);
        buzzGain.gain.linearRampToValueAtTime(0, t + dur);
        buzzOsc.connect(buzzGain);
        buzzGain.connect(dest);
        buzzOsc.start(t);
        buzzOsc.stop(t + dur + 0.05);

        // Vibrato — wider and faster than Western flute (Chinese style 揉音 róuyīn)
        const vib = audioCtx.createOscillator();
        vib.type = 'sine';
        vib.frequency.value = wideVibrato ? 5.5 + Math.random() * 1.5 : 5.0 + Math.random() * 2;
        const vibG = audioCtx.createGain();
        vibG.gain.value = freq * (wideVibrato ? 0.015 : 0.009);
        // Vibrato fades in (doesn't start immediately — Chinese style)
        vibG.gain.setValueAtTime(0, t);
        vibG.gain.linearRampToValueAtTime(freq * (wideVibrato ? 0.015 : 0.009), t + dur * 0.3);
        vib.connect(vibG);
        vibG.connect(osc.frequency);
        vib.start(t);
        vib.stop(t + dur + 0.1);

        // Breath/air noise (softer than Western flute)
        const breathGain = audioCtx.createGain();
        breathGain.gain.setValueAtTime(0, t);
        breathGain.gain.linearRampToValueAtTime(0.08, t + 0.03);
        breathGain.gain.linearRampToValueAtTime(0, t + dur);
        const breathFilt = audioCtx.createBiquadFilter();
        breathFilt.type = 'bandpass';
        breathFilt.frequency.value = freq * 2;
        breathFilt.Q.value = 1.5;
        breathFilt.connect(breathGain);
        breathGain.connect(dest);
        const breathSrc = audioCtx.createBufferSource();
        breathSrc.buffer = createNoiseBuffer(dur + 0.1);
        breathSrc.connect(breathFilt);
        breathSrc.start(t);
        breathSrc.stop(t + dur);

        osc.connect(noteGain);
        osc.start(t);
        osc.stop(t + dur + 0.05);
    }

    // === 古筝 GUZHENG (plucked zither — 21 strings) ===
    // Bright, shimmering plucked tones with characteristic bends and tremolos
    function startGuzheng(dest) {
        guzhengGainNode = audioCtx.createGain();
        guzhengGainNode.gain.value = activeMoodParams.guzhengVol;
        guzhengGainNode.connect(dest);
        musicNodes.push(guzhengGainNode);

        function playGuzhengPhrase() {
            if (!audioCtx || !musicPlaying) return;
            const m = activeMoodParams;
            if (m.guzhengVol <= 0) { setTimeout(playGuzhengPhrase, 5000); return; }
            const scale = m.scale;
            const now = audioCtx.currentTime;
            const noteCount = randInt(m.guzhengNotes[0], m.guzhengNotes[1]);
            let t = now + randFloat(0.1, 0.3);

            // Guzheng often plays rapid arpeggios (刮奏 guāzòu) or single plucks
            const style = randEl(['arpeggio', 'melody', 'tremolo', 'gliss']);

            if (style === 'gliss' && noteCount >= 3) {
                // 刮奏 guāzòu — rapid glissando across strings
                const ascending = Math.random() < 0.5;
                for (let i = 0; i < Math.min(noteCount, scale.length); i++) {
                    const idx = ascending ? i : (scale.length - 1 - i);
                    const safeIdx = Math.max(0, Math.min(scale.length - 1, idx));
                    playGuzhengPluck(t, scale[safeIdx], guzhengGainNode, 0.35);
                    t += randFloat(0.06, 0.12); // rapid cascade
                }
            } else if (style === 'tremolo') {
                // 摇指 yáozhǐ — tremolo on single note
                const freq = scale[randInt(0, scale.length - 1)];
                const repeats = randInt(6, 12);
                for (let i = 0; i < repeats; i++) {
                    playGuzhengPluck(t, freq, guzhengGainNode, 0.25 * (1 - i * 0.03));
                    t += randFloat(0.08, 0.12);
                }
            } else if (style === 'arpeggio') {
                // Broken chord arpeggio
                const startIdx = randInt(0, Math.max(0, scale.length - 3));
                for (let i = 0; i < Math.min(noteCount, 4); i++) {
                    const idx = Math.min(scale.length - 1, startIdx + i);
                    playGuzhengPluck(t, scale[idx], guzhengGainNode, 0.4);
                    t += randFloat(0.15, 0.35);
                }
            } else {
                // Melodic single plucks
                for (let i = 0; i < noteCount; i++) {
                    const idx = randInt(0, scale.length - 1);
                    const freq = scale[idx];
                    const bend = Math.random() < 0.25; // 按音 ànyīn — press bend
                    playGuzhengPluck(t, freq, guzhengGainNode, 0.4, bend);
                    t += randFloat(0.3, 0.8);
                }
            }

            const nextDelay = randFloat(m.guzhengInterval[0], m.guzhengInterval[1]) * 1000;
            setTimeout(playGuzhengPhrase, nextDelay);
        }

        setTimeout(playGuzhengPhrase, 4000);
    }

    function playGuzhengPluck(t, freq, dest, vol, bend) {
        const dur = randFloat(0.8, 1.8);
        const noteGain = audioCtx.createGain();
        // Sharp attack, natural decay (plucked string)
        noteGain.gain.setValueAtTime(0, t);
        noteGain.gain.linearRampToValueAtTime(vol, t + 0.005);
        noteGain.gain.exponentialRampToValueAtTime(vol * 0.4, t + 0.15);
        noteGain.gain.exponentialRampToValueAtTime(0.001, t + dur);
        noteGain.connect(dest);

        // Fundamental
        const osc = audioCtx.createOscillator();
        osc.type = 'triangle'; // triangle gives guzheng-like softness
        osc.frequency.setValueAtTime(freq, t);
        if (bend) {
            // 按音 ànyīn — characteristic guzheng pitch bend (up then back)
            osc.frequency.linearRampToValueAtTime(freq * 1.06, t + 0.2);
            osc.frequency.linearRampToValueAtTime(freq, t + 0.5);
        }
        osc.connect(noteGain);
        osc.start(t);
        osc.stop(t + dur + 0.05);

        // 2nd harmonic (brighter guzheng character)
        const osc2 = audioCtx.createOscillator();
        osc2.type = 'sine';
        osc2.frequency.value = freq * 2;
        const g2 = audioCtx.createGain();
        g2.gain.setValueAtTime(0, t);
        g2.gain.linearRampToValueAtTime(vol * 0.25, t + 0.005);
        g2.gain.exponentialRampToValueAtTime(0.001, t + dur * 0.5);
        osc2.connect(g2);
        g2.connect(dest);
        osc2.start(t);
        osc2.stop(t + dur * 0.5);

        // 3rd harmonic (shimmer)
        const osc3 = audioCtx.createOscillator();
        osc3.type = 'sine';
        osc3.frequency.value = freq * 3;
        const g3 = audioCtx.createGain();
        g3.gain.setValueAtTime(0, t);
        g3.gain.linearRampToValueAtTime(vol * 0.08, t + 0.005);
        g3.gain.exponentialRampToValueAtTime(0.001, t + dur * 0.3);
        osc3.connect(g3);
        g3.connect(dest);
        osc3.start(t);
        osc3.stop(t + dur * 0.3);

        // String noise (pluck transient)
        const ng = audioCtx.createGain();
        ng.gain.setValueAtTime(vol * 0.2, t);
        ng.gain.exponentialRampToValueAtTime(0.001, t + 0.03);
        const nf = audioCtx.createBiquadFilter();
        nf.type = 'bandpass';
        nf.frequency.value = freq * 3;
        nf.Q.value = 1;
        nf.connect(ng);
        ng.connect(dest);
        const ns = audioCtx.createBufferSource();
        ns.buffer = createNoiseBuffer(0.03);
        ns.connect(nf);
        ns.start(t);
        ns.stop(t + 0.03);
    }

    // === 二胡 ERHU (bowed 2-string fiddle) ===
    // Expressive, vocal quality with heavy vibrato and portamento
    function startErhu(dest) {
        erhuGainNode = audioCtx.createGain();
        erhuGainNode.gain.value = activeMoodParams.erhuVol;
        erhuGainNode.connect(dest);
        musicNodes.push(erhuGainNode);

        function playErhuPhrase() {
            if (!audioCtx || !musicPlaying) return;
            const m = activeMoodParams;
            if (m.erhuVol <= 0 || m.erhuDur[1] <= 0) { setTimeout(playErhuPhrase, 8000); return; }
            const scale = m.scale;
            const now = audioCtx.currentTime;
            let t = now + randFloat(0.2, 0.6);

            // Erhu plays long, expressive melodic lines (1-3 notes per phrase)
            const noteCount = randInt(1, 3);
            let prevFreq = null;

            for (let i = 0; i < noteCount; i++) {
                const idx = randInt(0, scale.length - 1);
                const freq = scale[idx];
                const dur = randFloat(m.erhuDur[0], m.erhuDur[1]);
                playErhuNote(t, freq, dur, erhuGainNode, 0.45, prevFreq);
                prevFreq = freq;
                t += dur + randFloat(0.1, 0.4);
            }

            const nextDelay = randFloat(m.erhuInterval[0], m.erhuInterval[1]) * 1000;
            setTimeout(playErhuPhrase, nextDelay);
        }

        setTimeout(playErhuPhrase, 6000);
    }

    function playErhuNote(t, freq, dur, dest, vol, slideFrom) {
        const noteGain = audioCtx.createGain();
        // Bow attack — slower than plucked, with swell
        noteGain.gain.setValueAtTime(0, t);
        noteGain.gain.linearRampToValueAtTime(vol * 0.7, t + 0.08);
        noteGain.gain.linearRampToValueAtTime(vol, t + dur * 0.3);
        noteGain.gain.linearRampToValueAtTime(vol * 0.6, t + dur * 0.8);
        noteGain.gain.linearRampToValueAtTime(0, t + dur);
        noteGain.connect(dest);

        // Main tone — sawtooth gives bowed string quality
        const osc = audioCtx.createOscillator();
        osc.type = 'sawtooth';
        if (slideFrom) {
            // 滑音 huáyīn — portamento between notes (very characteristic of erhu)
            osc.frequency.setValueAtTime(slideFrom, t);
            osc.frequency.linearRampToValueAtTime(freq, t + 0.15);
        } else {
            osc.frequency.value = freq;
        }

        // Filter to tame harshness and create nasal erhu quality
        const filt = audioCtx.createBiquadFilter();
        filt.type = 'lowpass';
        filt.frequency.value = freq * 3;
        filt.Q.value = 2;
        osc.connect(filt);

        // Nasal resonance (characteristic 鼻音 bíyīn of erhu)
        const nasalFilt = audioCtx.createBiquadFilter();
        nasalFilt.type = 'peaking';
        nasalFilt.frequency.value = freq * 2.5;
        nasalFilt.Q.value = 5;
        nasalFilt.gain.value = 6;
        filt.connect(nasalFilt);
        nasalFilt.connect(noteGain);

        // Heavy vibrato (揉弦 róuxián) — erhu vibrato is wider and more expressive
        const vib = audioCtx.createOscillator();
        vib.type = 'sine';
        vib.frequency.value = 5.0 + Math.random() * 1.5;
        const vibG = audioCtx.createGain();
        vibG.gain.setValueAtTime(0, t);
        vibG.gain.linearRampToValueAtTime(freq * 0.018, t + dur * 0.25);
        vib.connect(vibG);
        vibG.connect(osc.frequency);
        vib.start(t);
        vib.stop(t + dur + 0.1);

        // Bow noise (subtle scratchy quality)
        const bowGain = audioCtx.createGain();
        bowGain.gain.setValueAtTime(0, t);
        bowGain.gain.linearRampToValueAtTime(0.04, t + 0.05);
        bowGain.gain.linearRampToValueAtTime(0, t + dur);
        const bowFilt = audioCtx.createBiquadFilter();
        bowFilt.type = 'bandpass';
        bowFilt.frequency.value = freq * 4;
        bowFilt.Q.value = 0.5;
        bowFilt.connect(bowGain);
        bowGain.connect(dest);
        const bowSrc = audioCtx.createBufferSource();
        bowSrc.buffer = createNoiseBuffer(dur + 0.1);
        bowSrc.connect(bowFilt);
        bowSrc.start(t);
        bowSrc.stop(t + dur);

        osc.start(t);
        osc.stop(t + dur + 0.05);
    }

    // === ADAPTIVE AMBIENT (nature sounds — wind through bamboo, distant water) ===
    function startAdaptiveAmbient(dest) {
        const m = activeMoodParams;
        ambGainNode = audioCtx.createGain();
        ambGainNode.gain.value = m.ambVol;
        ambGainNode.connect(dest);

        // Bamboo wind / nature ambient layer
        ambNoiseNode = audioCtx.createBufferSource();
        ambNoiseNode.buffer = createNoiseBuffer(8);
        ambNoiseNode.loop = true;
        ambFiltNode = audioCtx.createBiquadFilter();
        ambFiltNode.type = 'bandpass';
        ambFiltNode.frequency.value = m.ambFreq;
        ambFiltNode.Q.value = m.ambQ;
        ambNoiseNode.connect(ambFiltNode);
        ambFiltNode.connect(ambGainNode);
        ambNoiseNode.start();
        musicNodes.push(ambNoiseNode);

        // Slow breathing LFO (like wind through bamboo grove)
        ambLfo = audioCtx.createOscillator();
        ambLfo.type = 'sine';
        ambLfo.frequency.value = m.ambLfoRate;
        ambLfoGain = audioCtx.createGain();
        ambLfoGain.gain.value = m.ambLfoDepth;
        ambLfo.connect(ambLfoGain);
        ambLfoGain.connect(ambGainNode.gain);
        ambLfo.start();
        musicNodes.push(ambLfo);

        // Optional: distant water/stream sound (higher frequency band)
        const waterGain = audioCtx.createGain();
        waterGain.gain.value = m.ambVol * 0.3;
        waterGain.connect(dest);
        const waterNoise = audioCtx.createBufferSource();
        waterNoise.buffer = createNoiseBuffer(10);
        waterNoise.loop = true;
        const waterFilt = audioCtx.createBiquadFilter();
        waterFilt.type = 'bandpass';
        waterFilt.frequency.value = 2500;
        waterFilt.Q.value = 0.3;
        waterNoise.connect(waterFilt);
        waterFilt.connect(waterGain);
        waterNoise.start();
        musicNodes.push(waterNoise);

        // Water LFO (gentle babbling)
        const waterLfo = audioCtx.createOscillator();
        waterLfo.type = 'sine';
        waterLfo.frequency.value = 0.15;
        const waterLfoG = audioCtx.createGain();
        waterLfoG.gain.value = m.ambVol * 0.15;
        waterLfo.connect(waterLfoG);
        waterLfoG.connect(waterGain.gain);
        waterLfo.start();
        musicNodes.push(waterLfo);
    }

    // --- SOUND EFFECTS (Chinese-themed) ---
    function sfx(type) {
        if (!audioCtx || !soundEnabled || !audioStarted) return;
        try {
            switch (type) {
                case 'speak': sfxSpeak(); break;
                case 'respond': sfxRespond(); break;
                case 'learn': sfxLearn(); break;
                case 'eat': sfxEat(); break;
                case 'drink': sfxDrink(); break;
                case 'sleep': sfxSleep(); break;
                case 'craft': sfxCraft(); break;
                case 'chop': sfxChop(); break;
                case 'fire': sfxFire(); break;
                case 'gather': sfxGather(); break;
                case 'fish': sfxFish(); break;
                case 'step': sfxStep(); break;
            }
        } catch(e) { /* ignore audio errors */ }
    }

    function sfxSpeak() {
        // Tonal Mandarin-like vocal with characteristic rising/falling tones
        const t = audioCtx.currentTime;
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(0.25, t);
        g.gain.linearRampToValueAtTime(0.3, t + 0.05);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
        g.connect(audioMaster);

        // Mandarin has 4 tones — simulate one randomly
        const baseF = randFloat(130, 180);
        const tone = randInt(1, 4);
        const osc = audioCtx.createOscillator();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(baseF, t);
        if (tone === 1) { // high flat
            osc.frequency.linearRampToValueAtTime(baseF * 1.2, t + 0.05);
            osc.frequency.setValueAtTime(baseF * 1.2, t + 0.3);
        } else if (tone === 2) { // rising
            osc.frequency.linearRampToValueAtTime(baseF * 0.9, t + 0.05);
            osc.frequency.linearRampToValueAtTime(baseF * 1.35, t + 0.3);
        } else if (tone === 3) { // dipping
            osc.frequency.linearRampToValueAtTime(baseF * 0.75, t + 0.15);
            osc.frequency.linearRampToValueAtTime(baseF * 1.1, t + 0.3);
        } else { // falling
            osc.frequency.linearRampToValueAtTime(baseF * 1.3, t + 0.03);
            osc.frequency.linearRampToValueAtTime(baseF * 0.7, t + 0.3);
        }

        const f1 = audioCtx.createBiquadFilter();
        f1.type = 'bandpass';
        f1.frequency.value = randEl([500, 700, 900]);
        f1.Q.value = 5;
        const f2 = audioCtx.createBiquadFilter();
        f2.type = 'bandpass';
        f2.frequency.value = randEl([1400, 1800, 2200]);
        f2.Q.value = 5;

        osc.connect(f1);
        osc.connect(f2);
        f1.connect(g);
        f2.connect(g);
        osc.start(t);
        osc.stop(t + 0.35);
    }

    function sfxLearn() {
        // Pentatonic ascending chime — like temple bells (磬 qing)
        const t = audioCtx.currentTime;

            osc2.start(t + i * 0.12);
            osc2.stop(t + i * 0.12 + 0.4);

        posc.type = 'triangle';
        posc.frequency.setValueAtTime(1200, t + 0.05);
        posc.frequency.exponentialRampToValueAtTime(600, t + 0.1);
        posc.connect(pg);
        posc.start(t + 0.05);
        posc.stop(t + 0.15);
    }

    function sfxFish() {
        // Fishing splash + line (钓鱼 diàoyú)
        const t = audioCtx.currentTime;
        // Line cast whoosh
        const wg = audioCtx.createGain();
        wg.gain.setValueAtTime(0.1, t);
        wg.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
        const wf = audioCtx.createBiquadFilter();
        wf.type = 'bandpass';
        wf.frequency.setValueAtTime(3000, t);
        wf.frequency.exponentialRampToValueAtTime(1000, t + 0.1);
        wf.Q.value = 0.5;
        wf.connect(wg);
        wg.connect(audioMaster);
        const wns = audioCtx.createBufferSource();
        wns.buffer = createNoiseBuffer(0.15);
        wns.connect(wf);
        wns.start(t);
        wns.stop(t + 0.15);
        // Water splash
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(0.22, t + 0.1);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
        g.connect(audioMaster);
        const ns = audioCtx.createBufferSource();
        ns.buffer = createNoiseBuffer(0.3);
        const filt = audioCtx.createBiquadFilter();
        filt.type = 'bandpass';
        filt.frequency.setValueAtTime(2000, t + 0.1);
        filt.frequency.exponentialRampToValueAtTime(400, t + 0.3);
        filt.Q.value = 1;
        ns.connect(filt);
        filt.connect(g);
        ns.start(t + 0.1);
        ns.stop(t + 0.4);
    }

    function sfxStep() {
        // Soft footstep on stone/gravel path (石路 shílù)
        const t = audioCtx.currentTime;
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(0.07, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.07);
        const filt = audioCtx.createBiquadFilter();
        filt.type = 'lowpass';
        filt.frequency.value = 800;
        filt.connect(g);
        g.connect(audioMaster);
        const ns = audioCtx.createBufferSource();
        ns.buffer = createNoiseBuffer(0.07);
        ns.connect(filt);
        ns.start(t);
        ns.stop(t + 0.07);
        // Small gravel crunch
        const cg = audioCtx.createGain();
        cg.gain.setValueAtTime(0.04, t + 0.01);
        cg.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
        const cf = audioCtx.createBiquadFilter();
        cf.type = 'highpass';
        cf.frequency.value = 4000;
        cf.connect(cg);
        cg.connect(audioMaster);
        const cns = audioCtx.createBufferSource();
        cns.buffer = createNoiseBuffer(0.04);
        cns.connect(cf);
        cns.start(t + 0.01);
        cns.stop(t + 0.05);
    }

    // Map action IDs to SFX types
    function sfxForAction(actionId) {
        if (!actionId) return;
        if (actionId.startsWith('eat')) sfx('eat');
        else if (actionId.startsWith('drink')) sfx('drink');
        else if (actionId.startsWith('sleep')) sfx('sleep');
        else if (actionId.startsWith('make') || actionId.startsWith('weave') || actionId === 'grind_ink') sfx('craft');
        else if (actionId === 'cut_bamboo') sfx('chop');
        else if (actionId.startsWith('pick') || actionId.startsWith('tend')) sfx('gather');
        else if (actionId.startsWith('cook') || actionId === 'brew_tea') sfx('fire');
        else if (actionId === 'fish_catch') sfx('fish');
        else if (actionId === 'carry_water') sfx('craft');
        else if (actionId.startsWith('write') || actionId.startsWith('paint') || actionId.startsWith('read')) sfx('craft');
    }
