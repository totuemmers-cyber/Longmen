    function findClosestObject(type) {
        let best = null, bestDist = Infinity;
        for (const obj of worldObjects) {
            if (obj.type === type) {
                const d = persons[0].distTo(obj.x, obj.y);
                if (d < bestDist) { bestDist = d; best = obj; }
            }
        }
        return best;
    }

    // Spaced repetition: pick from candidates weighted by recency (recent = less likely)
    function spacedPick(candidates, history, curiosity) {
        if (candidates.length === 0) return null;
        if (candidates.length === 1) return candidates[0];

        // Score each candidate: the more recently used, the lower the weight
        const weights = candidates.map(c => {
            const idx = history.indexOf(c.id);
            // Curiosity boosts novelty: curious characters strongly prefer new actions
            const noveltyBonus = 6 + (curiosity || 5) * 0.8;
            if (idx === -1) return noveltyBonus; // never done = highest weight
            // idx 0 = most recent => weight 1, idx 11 => weight ~8
            return 1 + idx * 0.7;
        });

        const total = weights.reduce((s, w) => s + w, 0);
        let r = Math.random() * total;
        for (let i = 0; i < candidates.length; i++) {
            r -= weights[i];
            if (r <= 0) return candidates[i];
        }
        return candidates[candidates.length - 1];
    }

    function chooseSpeakerAction() {
        const p = persons[0];
        let candidates = [];
        let isNeedAction = false;

        // Critical needs
        if (p.hunger < 30) {
            candidates = ACTION_DEFS.filter(a => a.needCheck === 'hunger');
            isNeedAction = true;
        } else if (p.thirst < 30) {
            candidates = ACTION_DEFS.filter(a => a.needCheck === 'thirst');
            isNeedAction = true;
        } else if (p.energy < 20) {
            candidates = ACTION_DEFS.filter(a => a.needCheck === 'energy');
            isNeedAction = true;
        }

        if (candidates.length === 0) {
            const indoorTargets = ['house', 'teahouse', 'kitchen', 'workshop'];
            const isHarshWeather = (currentWeather === 'rain' || currentWeather === 'snow') && weatherIntensity > 0.4;
            const r = Math.random();

            // In harsh weather, prefer indoor/sheltered activities
            if (isHarshWeather && r < 0.6) {
                candidates = ACTION_DEFS.filter(a =>
                    a.priority !== 'need' && indoorTargets.includes(a.target)
                );
            }

            if (candidates.length === 0) {
                // Sociability shifts the thresholds: social speakers do more social actions
                const socialThreshold = 0.85 - p.socialWeight * 0.12; // high geselligkeit → lower threshold → more social
                const productiveThreshold = socialThreshold - 0.15;

                if (r < productiveThreshold) {
                    candidates = ACTION_DEFS.filter(a => a.priority === 'productive');
                } else if (r < socialThreshold) {
                    candidates = ACTION_DEFS.filter(a => a.priority === 'social');
                } else {
                    candidates = ACTION_DEFS.filter(a => a.priority === 'idle');
                }
            }
        }

        if (candidates.length === 0) candidates = ACTION_DEFS.filter(a => a.priority === 'productive');
        if (candidates.length === 0) candidates = ACTION_DEFS.slice(); // ultimate fallback: any action

        // Use spaced repetition: prefer actions not done recently
        // Curiosity boosts weight for never-done actions (more variety)
        const chosen = spacedPick(candidates, p.actionHistory, p.neugier);

        // Track in history
        if (chosen) {
            // Remove if already in history, then add to front
            const existIdx = p.actionHistory.indexOf(chosen.id);
            if (existIdx !== -1) p.actionHistory.splice(existIdx, 1);
            p.actionHistory.unshift(chosen.id);
            // Trim to max
            if (p.actionHistory.length > p.actionHistoryMax) {
                p.actionHistory.length = p.actionHistoryMax;
            }
        }

        return chosen;
    }

    function buildSentence(action) {
        const template = randEl(action.templates);
        const words = template.map(conceptId => ({
            conceptId,
            hanzi: vocab[conceptId] ? vocab[conceptId].hanzi : conceptId,
            pinyin: vocab[conceptId] ? vocab[conceptId].pinyin : conceptId,
            de: vocab[conceptId] ? vocab[conceptId].de : conceptId
        }));
        const hanziText = words.map(w => w.hanzi).join('') + '!';
        const pinyinText = words.map(w => w.pinyin).join(' ') + '!';
        // Legacy: text field used by speech bubble display
        const text = hanziText;
        return { words, text, hanziText, pinyinText };
    }

    function speakerSpeak(action) {
        const sentence = buildSentence(action);
        const bubble = new SpeechBubble(persons[0], sentence.hanziText, sentence.words, false);
        bubble.hanziText = sentence.hanziText;
        bubble.pinyinText = sentence.pinyinText;
        speechBubbles.push(bubble);
        sfx('speak');
        addLog(`${persons[0].name}: "${sentence.hanziText}" (${sentence.pinyinText})`, 'speak');

        // Learner tries to learn (perception determines hearing range)
        const learner = persons[1];
        const dist = learner.distTo(persons[0].x, persons[0].y);
        if (dist <= learner.hearingRange) {
            learnerRespond(sentence, action);
        } else {
            // Too far away, no response
        }
    }

    function learnerRespond(sentence, action) {
        const learner = persons[1];
        const speaker = persons[0];

        // Check if learner can see the relevant objects/actions
        const canSee = true; // Simplified: if in hearing range, can also see

        if (canSee) {
            // Try to learn each word
            let newlyLearned = [];
            for (const w of sentence.words) {
                if (!learner.knownWords.has(w.conceptId)) {
                    if (Math.random() < learner.learnChance) {
                        learnWord(learner, w);
                        newlyLearned.push(w.hanzi);
                    }
                }
            }
        }

        // Build response — learner repeats in German translation
        setTimeout(() => {
            let responseWords = [];
            let allKnown = true;
            let anyKnown = false;
            for (const w of sentence.words) {
                if (learner.knownWords.has(w.conceptId)) {
                    responseWords.push(w.de.charAt(0).toUpperCase() + w.de.slice(1));
                    anyKnown = true;
                } else {
                    responseWords.push('...');
                    allKnown = false;
                }
            }

            let responseText;
            if (!anyKnown) {
                responseText = '...';
            } else {
                responseText = responseWords.join(' ');
                if (allKnown) responseText += '!';
            }

            const bubble = new SpeechBubble(learner, responseText, [], true);
            speechBubbles.push(bubble);
            if (responseText !== '...') {
                sfx('respond');
                addLog(`${learner.name}: "${responseText}"`, 'speak');
            }
        }, 600 / Math.max(1, gameSpeed));
    }

    // ============================================================
    //  NIGHTTIME STORYTELLING
    // ============================================================
    function canStartStorytelling() {
        if (storytelling.active) return false;
        if (storytelling.cooldownDay >= gameDay) return false;
        if (gameHour < 20 && gameHour >= 4) return false;
        const speaker = persons[0];
        if (speaker.state !== 'idle') return false;
        if (speaker.actionHistory.length < 3) return false;
        const fire = worldObjects.find(o => o.type === 'teahouse');
        if (!fire) return false;
        if (speaker.distTo(fire.x, fire.y) > 80) return false;
        return true;
    }

    function startStorytelling() {
        const speaker = persons[0];
        storytelling.active = true;
        storytelling.currentIdx = 0;
        storytelling.timer = 0;
        storytelling.cooldownDay = gameDay;

        // Build story from 3-5 recent actions
        const storyLen = Math.min(speaker.actionHistory.length, randInt(3, 5));
        const storyActions = speaker.actionHistory.slice(0, storyLen);
        storytelling.sentences = [];

        for (const actionId of storyActions) {
            const actionDef = ACTION_DEFS.find(a => a.id === actionId);
            if (actionDef && actionDef.templates && actionDef.templates.length > 0) {
                const template = randEl(actionDef.templates);
                const words = template.map(conceptId => ({
                    conceptId,
                    hanzi: vocab[conceptId] ? vocab[conceptId].hanzi : conceptId,
                    pinyin: vocab[conceptId] ? vocab[conceptId].pinyin : conceptId,
                    de: vocab[conceptId] ? vocab[conceptId].de : conceptId
                }));
                const hanziText = words.map(w => w.hanzi).join('') + '。';
                const pinyinText = words.map(w => w.pinyin).join(' ') + '.';
                storytelling.sentences.push({ text: hanziText, hanziText, pinyinText, words });
            }
        }

        if (storytelling.sentences.length === 0) {
            storytelling.active = false;
            return;
        }

        addLog(`${speaker.name} beginnt eine Geschichte am Feuer...`, 'speak');

        // Make nearby NPCs face the teahouse
        const fire = worldObjects.find(o => o.type === 'teahouse');
        if (fire) {
            for (const npc of npcs) {
                if (npc.distTo(fire.x, fire.y) < 100) {
                    npc.facing = Math.atan2(fire.y - npc.y, fire.x - npc.x);
                    if (npc.state === 'idle') {
                        npc.state = 'moving';
                        npc.targetX = fire.x + randFloat(-30, 30);
                        npc.targetY = fire.y + randFloat(-30, 30);
                        npc.targetX = Math.max(40, Math.min(WORLD_W - 40, npc.targetX));
                        npc.targetY = Math.max(40, Math.min(WORLD_H - 40, npc.targetY));
                    }
                }
            }
        }
    }

    function updateStorytelling(dt) {
        if (!storytelling.active) return;

        storytelling.timer -= dt;
        if (storytelling.timer > 0) return;

        const speaker = persons[0];

        if (storytelling.currentIdx < storytelling.sentences.length) {
            const sentence = storytelling.sentences[storytelling.currentIdx];
            const stBubble = new SpeechBubble(speaker, sentence.hanziText || sentence.text, sentence.words, false);
            stBubble.hanziText = sentence.hanziText || sentence.text;
            stBubble.pinyinText = sentence.pinyinText || '';
            speechBubbles.push(stBubble);
            sfx('speak');
            addLog(`${speaker.name}: "${sentence.hanziText || sentence.text}"`, 'speak');

            // Learner tries to learn from story
            const learner = persons[1];
            if (learner.distTo(speaker.x, speaker.y) <= learner.hearingRange) {
                for (const w of sentence.words) {
                    if (!learner.knownWords.has(w.conceptId) && vocab[w.conceptId]) {
                        if (Math.random() < learner.learnChance) {
                            learnWord(learner, w);
                        }
                    }
                }
            }

            storytelling.currentIdx++;
            storytelling.timer = randFloat(100, 180);
        } else {
            // Story ended — learner retells
            storytelling.active = false;
            learnerRetellStory();
        }
    }

    function learnerRetellStory() {
        const learner = persons[1];
        const speaker = persons[0];
        if (learner.distTo(speaker.x, speaker.y) > learner.hearingRange) return;

        // Pick 2-3 random sentences from the story and retell using known words
        const retellCount = Math.min(storytelling.sentences.length, randInt(1, 2));
        const retellIdxs = [];
        while (retellIdxs.length < retellCount && retellIdxs.length < storytelling.sentences.length) {
            const idx = randInt(0, storytelling.sentences.length - 1);
            if (!retellIdxs.includes(idx)) retellIdxs.push(idx);
        }

        setTimeout(() => {
            for (const idx of retellIdxs) {
                const sentence = storytelling.sentences[idx];
                const responseWords = sentence.words.map(w => {
                    if (learner.knownWords.has(w.conceptId)) {
                        return w.de.charAt(0).toUpperCase() + w.de.slice(1);
                    }
                    return '...';
                });
                const responseText = responseWords.join(' ');
                if (responseText.replace(/\.\.\./g, '').trim().length > 0) {
                    speechBubbles.push(new SpeechBubble(learner, responseText, [], true));
                    sfx('respond');
                    addLog(`${learner.name}: "${responseText}" (Nacherzählung)`, 'speak');
                }
            }
            // Boost relationship from shared storytelling
            boostRelationshipsNearby(speaker, 5);
        }, 800 / Math.max(1, gameSpeed));
    }

    // ============================================================
    //  DISCOVERY EVENTS
    // ============================================================
    const DISCOVERY_TYPES = [
        { type: 'ancient_scroll', speech: [['look','book','old'],['find','book','beautiful']],        desc: 'eine alte Schriftrolle' },
        { type: 'jade_stone',     speech: [['find','thing','beautiful'],['this','good','old']],       desc: 'einen Jade-Stein' },
        { type: 'old_coins',      speech: [['find','money','old'],['money','many','here']],           desc: 'alte Muenzen' },
        { type: 'carved_seal',    speech: [['find','thing','red'],['this','old','good']],             desc: 'ein geschnitztes Siegel' },
        { type: 'pottery_shards', speech: [['find','thing','old'],['look','this','here']],            desc: 'Keramikscherben' },
        { type: 'flower_arrangement', speech: [['flower','beautiful','many'],['look','flower','good']], desc: 'ein Blumengesteck' },
    ];

    function spawnDiscovery() {
        const available = DISCOVERY_TYPES.filter(d => !discoveredTypes.has(d.type));
        if (available.length === 0) return;
        const disc = randEl(available);
        const x = randFloat(60, WORLD_W - 60);
        const y = randFloat(60, WORLD_H - 60);
        discoveries.push({ ...disc, x, y, found: false });
        addLog('Etwas Ungewöhnliches ist aufgetaucht...', 'speak');
    }

    function updateDiscoveries(dt) {
        // Spawn timer (every 3-8 game days worth of ticks)
        discoveryTimer -= dt;
        if (discoveryTimer <= 0) {
            discoveryTimer = randFloat(8000, 22000); // roughly 3-8 game days
            spawnDiscovery();
        }

        // Speaker notices nearby undiscovered objects
        if (persons.length === 0) return;
        const speaker = persons[0];
        if (speaker.state !== 'idle' || storytelling.active) return;

        for (const disc of discoveries) {
            if (disc.found) continue;
            const d = speaker.distTo(disc.x, disc.y);
            const noticeRange = 40 + speaker.neugier * 6;
            if (d < noticeRange) {
                investigateDiscovery(disc);
                break;
            }
            // High curiosity speakers move toward discoveries
            if (d < noticeRange * 2 && speaker.neugier >= 6 && Math.random() < 0.001 * dt) {
                speaker.state = 'moving';
                speaker.currentAction = { id: 'investigate', duration: 200, templates: [['look','this','here']], effects: {}, activityDe: 'Untersucht etwas...', priority: 'idle' };
                speaker.targetX = disc.x + randFloat(-10, 10);
                speaker.targetY = disc.y + randFloat(-10, 10);
                speaker.activityDe = 'Untersucht etwas...';
                break;
            }
        }
    }

    function investigateDiscovery(disc) {
        disc.found = true;
        discoveredTypes.add(disc.type);
        const speaker = persons[0];

        // Speak about discovery
        const template = randEl(disc.speech);
        const words = template.map(conceptId => ({
            conceptId,
            hanzi: vocab[conceptId] ? vocab[conceptId].hanzi : conceptId,
            pinyin: vocab[conceptId] ? vocab[conceptId].pinyin : conceptId,
            de: vocab[conceptId] ? vocab[conceptId].de : conceptId
        })).filter(w => vocab[w.conceptId]);

        if (words.length > 0) {
            const hanziText = words.map(w => w.hanzi).join('') + '!';
            const pinyinText = words.map(w => w.pinyin).join(' ') + '!';
            const discBubble = new SpeechBubble(speaker, hanziText, words, false);
            discBubble.hanziText = hanziText;
            discBubble.pinyinText = pinyinText;
            speechBubbles.push(discBubble);
            sfx('speak');
            addLog(`${speaker.name} entdeckt ${disc.desc}: "${hanziText}"`, 'speak');

            // Learner can learn
            const learner = persons[1];
            if (learner.distTo(speaker.x, speaker.y) <= learner.hearingRange) {
                for (const w of words) {
                    if (!learner.knownWords.has(w.conceptId)) {
                        if (Math.random() < learner.learnChance * 1.3) {
                            learnWord(learner, w);
                        }
                    }
                }
            }
        }

        // Remove after a short delay
        setTimeout(() => {
            discoveries = discoveries.filter(d => d !== disc);
        }, 3000 / Math.max(1, gameSpeed));
    }

    function drawDiscoveries(ctx) {
        for (const disc of discoveries) {
            if (disc.found) continue;
            const x = disc.x * canvasScale;
            const y = disc.y * canvasScale;
            const s = canvasScale;
            const t = gameTick * 0.03;

            // Subtle golden glow
            ctx.save();
            ctx.globalAlpha = 0.3 + Math.sin(t) * 0.15;
            ctx.beginPath();
            ctx.arc(x, y, 12*s, 0, Math.PI*2);
            ctx.fillStyle = 'rgba(212,160,48,0.15)';
            ctx.fill();
            ctx.globalAlpha = 1;

            switch (disc.type) {
                case 'ancient_scroll':
                    // Rolled scroll
                    ctx.fillStyle = '#d8c898';
                    ctx.fillRect(x - 8*s, y - 2*s, 16*s, 4*s);
                    // Roll ends
                    ctx.fillStyle = '#c8b080';
                    ctx.beginPath();
                    ctx.ellipse(x - 8*s, y, 1.5*s, 2.5*s, 0, 0, Math.PI*2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.ellipse(x + 8*s, y, 1.5*s, 2.5*s, 0, 0, Math.PI*2);
                    ctx.fill();
                    // Red seal stamp
                    ctx.fillStyle = '#cc3030';
                    ctx.fillRect(x + 2*s, y - 1*s, 3*s, 2*s);
                    // Faint ink characters
                    ctx.fillStyle = 'rgba(30,30,30,0.3)';
                    ctx.fillRect(x - 5*s, y - 0.5*s, 1*s, 1*s);
                    ctx.fillRect(x - 2*s, y - 0.5*s, 1*s, 1*s);
                    break;
                case 'jade_stone':
                    // Polished jade piece (green)
                    ctx.fillStyle = '#5aaa5a';
                    ctx.globalAlpha = 0.85 + Math.sin(t * 2) * 0.15;
                    ctx.beginPath();
                    ctx.moveTo(x, y - 6*s);
                    ctx.lineTo(x + 5*s, y - 2*s);
                    ctx.lineTo(x + 4*s, y + 4*s);
                    ctx.lineTo(x - 4*s, y + 4*s);
                    ctx.lineTo(x - 5*s, y - 2*s);
                    ctx.closePath();
                    ctx.fill();
                    // Shine highlight
                    ctx.fillStyle = 'rgba(180,240,180,0.4)';
                    ctx.beginPath();
                    ctx.ellipse(x - 1*s, y - 1*s, 2*s, 1.5*s, -0.3, 0, Math.PI*2);
                    ctx.fill();
                    ctx.globalAlpha = 1;
                    break;
                case 'old_coins':
                    // Chinese coins with square holes
                    ctx.fillStyle = '#b0a060';
                    for (let i = 0; i < 4; i++) {
                        const cx = x + (i - 1.5) * 4*s;
                        const cy = y + Math.sin(i * 1.5) * 2*s;
                        ctx.beginPath();
                        ctx.arc(cx, cy, 3*s, 0, Math.PI*2);
                        ctx.fill();
                        // Square hole
                        ctx.fillStyle = '#6a5a30';
                        ctx.fillRect(cx - 1*s, cy - 1*s, 2*s, 2*s);
                        ctx.fillStyle = '#b0a060';
                    }
                    break;
                case 'carved_seal':
                    // Stone seal / chop
                    ctx.fillStyle = '#8a6a4a';
                    ctx.fillRect(x - 3*s, y - 5*s, 6*s, 10*s);
                    // Carved top
                    ctx.fillStyle = '#9a7a5a';
                    ctx.beginPath();
                    ctx.arc(x, y - 5*s, 3*s, Math.PI, 0);
                    ctx.fill();
                    // Red ink on bottom
                    ctx.fillStyle = '#cc3030';
                    ctx.fillRect(x - 2.5*s, y + 3*s, 5*s, 2*s);
                    break;
                case 'pottery_shards':
                    // Broken pottery pieces
                    ctx.fillStyle = '#b08050';
                    ctx.beginPath();
                    ctx.moveTo(x - 4*s, y - 3*s);
                    ctx.lineTo(x + 2*s, y - 4*s);
                    ctx.lineTo(x + 4*s, y + 1*s);
                    ctx.lineTo(x - 1*s, y + 3*s);
                    ctx.closePath();
                    ctx.fill();
                    ctx.fillStyle = '#a07040';
                    ctx.beginPath();
                    ctx.moveTo(x + 3*s, y - 1*s);
                    ctx.lineTo(x + 7*s, y - 2*s);
                    ctx.lineTo(x + 6*s, y + 3*s);
                    ctx.lineTo(x + 2*s, y + 2*s);
                    ctx.closePath();
                    ctx.fill();
                    // Blue glaze fragments
                    ctx.strokeStyle = '#4060a0';
                    ctx.lineWidth = 0.5*s;
                    ctx.beginPath();
                    ctx.arc(x, y - 1*s, 2*s, 0.5, 2.5);
                    ctx.stroke();
                    break;
                case 'flower_arrangement':
                    // Vase with flowers
                    ctx.fillStyle = '#c0a060';
                    ctx.beginPath();
                    ctx.ellipse(x, y + 3*s, 3*s, 4*s, 0, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillRect(x - 2*s, y - 1*s, 4*s, 2*s);
                    // Stems
                    ctx.strokeStyle = '#3a7a2a';
                    ctx.lineWidth = 0.8*s;
                    ctx.beginPath();
                    ctx.moveTo(x - 1*s, y - 1*s); ctx.lineTo(x - 3*s, y - 8*s);
                    ctx.moveTo(x, y - 1*s); ctx.lineTo(x + 1*s, y - 10*s);
                    ctx.moveTo(x + 1*s, y - 1*s); ctx.lineTo(x + 4*s, y - 7*s);
                    ctx.stroke();
                    // Flower heads
                    const flowerColors = ['#e06080', '#e0a040', '#d060d0'];
                    for (let i = 0; i < 3; i++) {
                        const fx = [x - 3*s, x + 1*s, x + 4*s][i];
                        const fy = [y - 8*s, y - 10*s, y - 7*s][i];
                        ctx.fillStyle = flowerColors[i];
                        ctx.beginPath();
                        ctx.arc(fx, fy, 2*s, 0, Math.PI*2);
                        ctx.fill();
                        ctx.fillStyle = '#e0d030';
                        ctx.beginPath();
                        ctx.arc(fx, fy, 0.8*s, 0, Math.PI*2);
                        ctx.fill();
                    }
                    break;
            }
            ctx.restore();
        }
    }

    // ============================================================
    //  AI - MAIN LOOP
    // ============================================================
    function updateSpeakerAI(dt) {
        const p = persons[0];

        switch (p.state) {
            case 'idle':
                p.idleTimer -= dt;
                p.activityDe = 'Untätig';
                // Check storytelling trigger
                if (!storytelling.active && p.idleTimer <= 0 && canStartStorytelling()) {
                    startStorytelling();
                    p.idleTimer = 200; // wait during storytelling
                    p.activityDe = 'Erzählt eine Geschichte';
                    break;
                }
                if (storytelling.active) {
                    p.activityDe = 'Erzählt eine Geschichte';
                    break;
                }
                if (p.idleTimer <= 0) {
                    // Choose next action
                    const action = chooseSpeakerAction();
                    p.currentAction = action;
                    p.state = 'moving';
                    p.activityDe = 'Geht zu ' + (action.activityDe || '...');

                    // Find target
                    if (action.target) {
                        const obj = findClosestObject(action.target);
                        if (obj) {
                            p.targetX = obj.x + randFloat(-15, 15);
                            p.targetY = obj.y + randFloat(-15, 15);
                        }
                    } else if (action.requiresOther) {
                        p.targetX = persons[1].x + randFloat(-20, 20);
                        p.targetY = persons[1].y + randFloat(-20, 20);
                    } else {
                        p.targetX = p.x + randFloat(-60, 60);
                        p.targetY = p.y + randFloat(-40, 40);
                    }
                    // Clamp to world
                    p.targetX = Math.max(30, Math.min(WORLD_W - 30, p.targetX));
                    p.targetY = Math.max(30, Math.min(WORLD_H - 30, p.targetY));
                }
                break;

            case 'moving':
                if (p.moveToward(p.targetX, p.targetY, dt)) {
                    if (!p.currentAction) {
                        // Safety: if action was lost, return to idle
                        p.state = 'idle';
                        p.idleTimer = 60;
                        break;
                    }
                    p.state = 'acting';
                    p.actionTimer = p.currentAction.duration / (0.5 + p.geschick * 0.08) + 240; // +4s pause after speaking
                    p.activityDe = p.currentAction.activityDe;
                    sfxForAction(p.currentAction.id);
                    speakerSpeak(p.currentAction);
                }
                break;

            case 'acting':
                p.actionTimer -= dt;
                if (p.actionTimer <= 0) {
                    // Apply effects
                    if (p.currentAction.effects) {
                        if (p.currentAction.effects.hunger) p.hunger = Math.min(100, p.hunger + p.currentAction.effects.hunger);
                        if (p.currentAction.effects.thirst) p.thirst = Math.min(100, p.thirst + p.currentAction.effects.thirst);
                        if (p.currentAction.effects.energy) p.energy = Math.min(100, p.energy + p.currentAction.effects.energy);
                    }
                    // Track camp progress
                    if (p.currentAction.id) {
                        campProgress[p.currentAction.id] = (campProgress[p.currentAction.id] || 0) + 1;
                        checkCampMilestones();
                        // Boost relationships with nearby characters
                        boostRelationshipsNearby(p, 3);
                    }
                    p.state = 'idle';
                    p.idleTimer = randInt(40, 140) / (0.5 + p.geschick * 0.05);
                    p.currentAction = null;
                }
                break;
        }
    }

    function updateLearnerAI(dt) {
        const learner = persons[1];
        const speaker = persons[0];
        const distToSpeaker = learner.distTo(speaker.x, speaker.y);

        // --- Freeze (stunned from wrong quiz answer) ---
        if (learnerFreezeTimer > 0) {
            learner.activityDe = 'Verwirrt...';
            return; // Skip all AI while frozen
        }

        // --- Critical needs override only when idle ---
        if (learner.state === 'idle') {
            let needAction = null;
            if (learner.hunger < 25) {
                const food = findClosestObjectFrom(learner, 'kitchen') || findClosestObjectFrom(learner, 'market');
                if (food) {
                    needAction = { target: food, action: { id: 'eat_self', duration: 120, effects: { hunger: 38 }, activityDe: 'isst' }, label: 'Geht essen' };
                }
            } else if (learner.thirst < 25) {
                const water = findClosestObjectFrom(learner, 'well') || findClosestObjectFrom(learner, 'teahouse');
                if (water) {
                    needAction = { target: water, action: { id: 'drink_self', duration: 80, effects: { thirst: 53 }, activityDe: 'trinkt' }, label: 'Geht trinken' };
                }
            } else if (learner.energy < 15) {
                const house = findClosestObjectFrom(learner, 'house');
                if (house) {
                    needAction = { target: house, action: { id: 'sleep_self', duration: 300, effects: { energy: 45 }, activityDe: 'schlaeft' }, label: 'Geht schlafen' };
                }
            }

            if (needAction) {
                learner.state = 'moving';
                learner.targetX = needAction.target.x + randFloat(-10, 10);
                learner.targetY = needAction.target.y + randFloat(-10, 10);
                learner.currentAction = needAction.action;
                learner.activityDe = needAction.label;
                learner.followMode = 'returning'; // will return to speaker after
                return;
            }
        }

        // --- Follow mode management (only when idle) ---
        if (learner.state === 'idle') {
            switch (learner.followMode) {
                case 'following':
                    learner.followTimer -= dt;
                    // Curiosity drives wander probability: curious learners explore more
                    if (learner.followTimer <= 0) {
                        if (Math.random() < learner.wanderChance) {
                            learner.followMode = 'wandering';
                            // Curious learners wander further and longer
                            const wanderRange = 80 + learner.neugier * 8;
                            learner.wanderTimer = randInt(100 + learner.neugier * 15, 300 + learner.neugier * 20);
                            learner.targetX = learner.x + randFloat(-wanderRange, wanderRange);
                            learner.targetY = learner.y + randFloat(-wanderRange * 0.8, wanderRange * 0.8);
                            learner.targetX = Math.max(40, Math.min(WORLD_W - 40, learner.targetX));
                            learner.targetY = Math.max(40, Math.min(WORLD_H - 40, learner.targetY));
                            learner.activityDe = 'Schaut sich um';
                        }
                        // Sociable learners re-check sooner (shorter follow timer)
                        learner.followTimer = randInt(300, 800) / (0.5 + learner.geselligkeit * 0.08);
                    }
                    break;

                case 'wandering':
                    learner.wanderTimer -= dt;
                    // Sociable learners return sooner; hearing range determines awareness of distance
                    const maxWanderDist = learner.hearingRange * (2.0 - learner.geselligkeit * 0.08);
                    if (learner.wanderTimer <= 0 || distToSpeaker > maxWanderDist) {
                        learner.followMode = 'returning';
                        learner.activityDe = 'Kehrt zurück zu ' + speaker.name;
                    }
                    break;

                case 'returning':
                    // Sociable learners come back closer
                    if (distToSpeaker < learner.hearingRange * 0.5) {
                        learner.followMode = 'following';
                        learner.followTimer = randInt(300, 800) / (0.5 + learner.geselligkeit * 0.08);
                    }
                    break;
            }
        }

        // --- Movement and actions ---
        switch (learner.state) {
            case 'idle': {
                if (learner.followMode === 'following' || learner.followMode === 'returning') {
                    learner.activityDe = learner.followMode === 'returning'
                        ? 'Kehrt zurück zu ' + speaker.name
                        : 'Folgt ' + speaker.name;

                    if (distToSpeaker > learner.hearingRange * 0.5) {
                        // Move toward speaker
                        const angle = Math.atan2(speaker.y - learner.y, speaker.x - learner.x);
                        const followDist = 30 + Math.random() * 25;
                        learner.targetX = speaker.x - Math.cos(angle) * followDist;
                        learner.targetY = speaker.y - Math.sin(angle) * followDist;
                        learner.targetX = Math.max(30, Math.min(WORLD_W - 30, learner.targetX));
                        learner.targetY = Math.max(30, Math.min(WORLD_H - 30, learner.targetY));
                        learner.moveToward(learner.targetX, learner.targetY, dt);
                        learner.facing = angle;
                    } else if (distToSpeaker > 25) {
                        // Near speaker: wander gently around them
                        if (Math.random() < 0.003 * dt) {
                            learner.targetX = speaker.x + randFloat(-45, 45);
                            learner.targetY = speaker.y + randFloat(-45, 45);
                            learner.targetX = Math.max(30, Math.min(WORLD_W - 30, learner.targetX));
                            learner.targetY = Math.max(30, Math.min(WORLD_H - 30, learner.targetY));
                        }
                        learner.moveToward(learner.targetX, learner.targetY, dt);
                    }
                } else if (learner.followMode === 'wandering') {
                    learner.activityDe = 'Schaut sich um';
                    // Move to wander target, pick new one when reached
                    if (learner.distTo(learner.targetX, learner.targetY) < 10) {
                        learner.targetX = learner.x + randFloat(-80, 80);
                        learner.targetY = learner.y + randFloat(-60, 60);
                        learner.targetX = Math.max(40, Math.min(WORLD_W - 40, learner.targetX));
                        learner.targetY = Math.max(40, Math.min(WORLD_H - 40, learner.targetY));
                    }
                    learner.moveToward(learner.targetX, learner.targetY, dt);
                }
                break;
            }

            case 'moving':
                if (learner.moveToward(learner.targetX, learner.targetY, dt)) {
                    if (learner.currentAction) {
                        learner.state = 'acting';
                        learner.actionTimer = learner.currentAction.duration / (0.5 + learner.geschick * 0.08);
                        learner.activityDe = learner.currentAction.activityDe;
                        sfxForAction(learner.currentAction.id);
                    } else {
                        learner.state = 'idle';
                    }
                }
                break;

            case 'acting':
                learner.actionTimer -= dt;
                if (learner.actionTimer <= 0) {
                    if (learner.currentAction && learner.currentAction.effects) {
                        if (learner.currentAction.effects.hunger) learner.hunger = Math.min(100, learner.hunger + learner.currentAction.effects.hunger);
                        if (learner.currentAction.effects.thirst) learner.thirst = Math.min(100, learner.thirst + learner.currentAction.effects.thirst);
                        if (learner.currentAction.effects.energy) learner.energy = Math.min(100, learner.energy + learner.currentAction.effects.energy);
                    }
                    learner.state = 'idle';
                    learner.currentAction = null;
                    // After need action, return to speaker
                    learner.followMode = 'returning';
                }
                break;
        }
    }

    function findClosestObjectFrom(person, type) {
        let best = null, bestDist = Infinity;
        for (const obj of worldObjects) {
            if (obj.type === type) {
                const d = person.distTo(obj.x, obj.y);
                if (d < bestDist) { bestDist = d; best = obj; }
            }
        }
        return best;
    }

        el.innerHTML = `

                <div class="char-portrait" style="background:${portraitBg};color:#1a1a10;font-weight:bold;">
                    ${person.name.charAt(0)}
                </div>
                <div>
                    <div class="char-name">${person.name}</div>
                    <div class="char-role">${roleLabel}</div>
                </div>

    function renderVocabPanel() {

        const pct = total > 0 ? Math.round(known / total * 100) : 0;

        document.getElementById('vocab-progress').textContent = `${known} / ${total} Wörter gelernt (${pct}%)`;
        document.getElementById('vocab-bar').style.width = pct + '%';

        const listEl = document.getElementById('vocab-list');
        let html = '';
        for (const cid of learner.wordHistory) {
            const v = vocab[cid];
            if (v) {
                html += `<div class="vocab-word" data-cid="${cid}" style="cursor:pointer;" title="Klicken für Kalligraphie"><span class="pseudo">${v.hanzi}</span><span style="color:#a09070;font-size:10px;">${v.pinyin}</span><span class="meaning">${v.de}</span></div>`;
            }
        }
        if (known === 0) {
            html = '<div style="color:#5a5a4a;font-style:italic;">Noch keine Woerter gelernt</div>';
        }
        listEl.innerHTML = html;
    }

        if (calligraphyOverlays.length === 0) {
            _advanceCalligraphyQueue();

    // ============================================================
    //  BACKGROUND NPCs (non-learning villagers)
    // ============================================================
    class NPC {
        constructor(name) {
            this.name = name;
            this.x = randFloat(80, WORLD_W - 80);
            this.y = randFloat(80, WORLD_H - 80);
            this.targetX = this.x;
            this.targetY = this.y;
            this.facing = randFloat(0, Math.PI * 2);
            this.speed = randFloat(0.4, 1.0);
            this.state = 'idle'; // idle, moving, chatting
            this.idleTimer = randFloat(60, 300);
            this.chatTimer = 0;
            this.chatPartner = null;
            this.currentAction = null;
            this.activityDe = 'Untätig';

            // Appearance
            const skinTones = ['#e8c8a0','#d4b088','#e0c098','#dab890','#e8d0a8','#d0a880'];
            const hairColors = ['#1a1008','#0a0a08','#1a1a10','#2a1a10'];
            const clothColors = ['#5a5a6a','#6a5040','#4a6a5a','#7a5a3a','#5a4a60','#6a6a4a'];
            this.skinTone = randEl(skinTones);
            this.hairColor = randEl(hairColors);
            this.clothColor = randEl(clothColors);
            this.color = '#8a8070';

            // Relationships
            this.relationships = {};
        }

        distTo(ox, oy) {
            return Math.sqrt((this.x - ox) ** 2 + (this.y - oy) ** 2);
        }

        moveToward(tx, ty, dt) {
            const dx = tx - this.x;
            const dy = ty - this.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 3) return true;
            const spd = this.speed * dt * 0.35;
            const step = Math.min(spd, dist);
            this.x += (dx / dist) * step;
            this.y += (dy / dist) * step;
            this.facing = Math.atan2(dy, dx);
            return dist < 8;
        }
    }

    // ============================================================
    //  SEASONAL WILDLIFE & MIGRATION
    // ============================================================
    let wildlife = [];
    let lastWildlifeSeason = null;

    const ANIMAL_TYPES = [
        { type: 'crane',     seasons: ['spring','summer','autumn'], speed: 0.5, fleeRange: 90, zonePref: 'water', flockSize: 1 },
        { type: 'magpie',    seasons: ['spring','summer'],          speed: 1.2, fleeRange: 70, zonePref: 'sky',   flockSize: 3 },
        { type: 'rabbit',    seasons: ['spring','summer','autumn','winter'], speed: 1.0, fleeRange: 60, zonePref: 'land', flockSize: 1 },
        { type: 'koi',       seasons: ['spring','summer','autumn'], speed: 0.4, fleeRange: 30, zonePref: 'water', flockSize: 3 },
        { type: 'cat',       seasons: ['spring','summer','autumn','winter'], speed: 0.6, fleeRange: 50, zonePref: 'land', flockSize: 1 },
        { type: 'butterfly', seasons: ['spring','summer'],          speed: 0.8, fleeRange: 60, zonePref: 'sky',   flockSize: 2 },
    ];

    // Water zone near the water object
    const WATER_ZONE = { x: 770, y: 460, r: 120 };

    class WildAnimal {
        constructor(type, x, y, speed, fleeRange) {
            this.type = type;
            this.x = x;
            this.y = y;
            this.speed = speed;
            this.fleeRange = fleeRange;
            this.targetX = x;
            this.targetY = y;
            this.wanderTimer = randFloat(60, 200);
            this.fleeing = false;
            this.animPhase = randFloat(0, Math.PI * 2);
            this.facing = randFloat(0, Math.PI * 2);
            this.alive = true;
        }

        update(dt) {
            this.animPhase += dt * 0.05;

            // Check flee from all characters
            let closestDist = Infinity;
            let fleeFromX = 0, fleeFromY = 0;
            const allChars = [...persons, ...npcs];
            for (const c of allChars) {
                const d = Math.sqrt((this.x - c.x) ** 2 + (this.y - c.y) ** 2);
                if (d < closestDist) {
                    closestDist = d;
                    fleeFromX = c.x;
                    fleeFromY = c.y;
                }
            }

            if (closestDist < this.fleeRange) {
                this.fleeing = true;
                const angle = Math.atan2(this.y - fleeFromY, this.x - fleeFromX);
                this.targetX = this.x + Math.cos(angle) * 80;
                this.targetY = this.y + Math.sin(angle) * 80;
                this.targetX = Math.max(10, Math.min(WORLD_W - 10, this.targetX));
                this.targetY = Math.max(10, Math.min(WORLD_H - 10, this.targetY));
            } else {
                this.fleeing = false;
                this.wanderTimer -= dt;
                if (this.wanderTimer <= 0) {
                    this.wanderTimer = randFloat(80, 250);
                    if (this.type === 'koi') {
                        // Stay near water
                        this.targetX = WATER_ZONE.x + randFloat(-WATER_ZONE.r, WATER_ZONE.r);
                        this.targetY = WATER_ZONE.y + randFloat(-WATER_ZONE.r * 0.6, WATER_ZONE.r * 0.6);
                    } else {
                        this.targetX = Math.max(20, Math.min(WORLD_W - 20, this.x + randFloat(-100, 100)));
                        this.targetY = Math.max(20, Math.min(WORLD_H - 20, this.y + randFloat(-60, 60)));
                    }
                }
            }

            // Move toward target
            const dx = this.targetX - this.x;
            const dy = this.targetY - this.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist > 2) {
                const spd = this.speed * (this.fleeing ? 2.0 : 0.6) * dt * 0.4;
                const step = Math.min(spd, dist);
                this.x += (dx / dist) * step;
                this.y += (dy / dist) * step;
                this.facing = Math.atan2(dy, dx);
            }

            // Despawn if off screen
            if (this.x < -30 || this.x > WORLD_W + 30 || this.y < -30 || this.y > WORLD_H + 30) {
                this.alive = false;
            }
        }
    }

    function spawnWildlife() {
        const season = getSeason();
        wildlife = [];
        for (const def of ANIMAL_TYPES) {
            if (!def.seasons.includes(season)) continue;
            const count = def.flockSize + (season === 'spring' ? 1 : 0);
            for (let i = 0; i < count; i++) {
                let x, y;
                if (def.zonePref === 'water') {
                    x = WATER_ZONE.x + randFloat(-WATER_ZONE.r, WATER_ZONE.r);
                    y = WATER_ZONE.y + randFloat(-WATER_ZONE.r * 0.5, WATER_ZONE.r * 0.5);
                } else if (def.zonePref === 'sky') {
                    x = randFloat(50, WORLD_W - 50);
                    y = randFloat(30, WORLD_H * 0.4);
                } else {
                    x = randFloat(50, WORLD_W - 50);
                    y = randFloat(50, WORLD_H - 50);
                }
                wildlife.push(new WildAnimal(def.type, x, y, def.speed, def.fleeRange));
            }
        }
        lastWildlifeSeason = season;
    }

    function updateWildlife(dt) {
        // Check for season change
        const season = getSeason();
        if (season !== lastWildlifeSeason) {
            spawnWildlife();
        }

        for (const a of wildlife) a.update(dt);
        wildlife = wildlife.filter(a => a.alive);

        // Speaker occasionally notices nearby animal
        if (persons.length > 0 && Math.random() < 0.0004 * dt) {
            const speaker = persons[0];
            if (speaker.state === 'idle') {
                for (const a of wildlife) {
                    const d = speaker.distTo(a.x, a.y);
                    const noticeRange = 60 + speaker.neugier * 8;
                    if (d < noticeRange) {
                        speakerReactToAnimal(a.type);
                        break;
                    }
                }
            }
        }
    }

    function speakerReactToAnimal(animalType) {
        const conceptMap = {
            crane: ['bird','look','beautiful'],
            magpie: ['bird','sky','beautiful'],
            rabbit: ['look','small','fast'],
            koi: ['fish','water','look'],
            cat: ['cat','small','look'],
            butterfly: ['look','beautiful','flower']
        };
        const concepts = (conceptMap[animalType] || ['look']).filter(c => vocab[c]);
        if (concepts.length === 0) return;
        const chosen = concepts.slice(0, randInt(1, 2));
        const words = chosen.map(c => ({ conceptId: c, hanzi: vocab[c].hanzi, pinyin: vocab[c].pinyin, de: vocab[c].de }));
        const hanziText = words.map(w => w.hanzi).join('') + '!';
        const pinyinText = words.map(w => w.pinyin).join(' ') + '!';
        const anBubble = new SpeechBubble(persons[0], hanziText, words, false);
        anBubble.hanziText = hanziText;
        anBubble.pinyinText = pinyinText;
        speechBubbles.push(anBubble);
        sfx('speak');
        addLog(`${persons[0].name}: "${hanziText}" (${animalType})`, 'speak');

        const learner = persons[1];
        if (learner.distTo(persons[0].x, persons[0].y) <= learner.hearingRange) {
            for (const w of words) {
                if (!learner.knownWords.has(w.conceptId)) {
                    if (Math.random() < learner.learnChance) {
                        learnWord(learner, w);
                    }
                }
            }
        }
    }

    function drawWildlife(ctx) {
        for (const a of wildlife) {
            const x = a.x * canvasScale;
            const y = a.y * canvasScale;
            const s = canvasScale;
            const t = a.animPhase;

            ctx.save();
            ctx.translate(x, y);

            switch (a.type) {
                case 'crane': {
                    // Long legs
                    ctx.strokeStyle = '#2a2a2a';
                    ctx.lineWidth = 1.2*s;
                    const legBob = Math.sin(t * 2) * 2 * s;
                    ctx.beginPath();
                    ctx.moveTo(-3*s, 4*s); ctx.lineTo(-3*s, 14*s + legBob);
                    ctx.moveTo(3*s, 4*s); ctx.lineTo(3*s, 14*s - legBob);
                    ctx.stroke();
                    // White body
                    ctx.fillStyle = '#f0ece0';
                    ctx.beginPath();
                    ctx.ellipse(0, 0, 8*s, 5*s, 0, 0, Math.PI*2);
                    ctx.fill();
                    // Long neck
                    const neckAngle = Math.sin(t * 1.5) * 0.1;
                    ctx.strokeStyle = '#f0ece0';
                    ctx.lineWidth = 3*s;
                    ctx.beginPath();
                    ctx.moveTo(Math.cos(a.facing) * 6*s, -2*s);
                    ctx.quadraticCurveTo(Math.cos(a.facing) * 10*s, -10*s, Math.cos(a.facing) * 8*s, -16*s);
                    ctx.stroke();
                    // Head
                    const hx = Math.cos(a.facing) * 8*s;
                    ctx.beginPath();
                    ctx.arc(hx, -16*s, 3*s, 0, Math.PI*2);
                    ctx.fillStyle = '#f0ece0';
                    ctx.fill();
                    // Red crown
                    ctx.beginPath();
                    ctx.arc(hx, -18*s, 1.5*s, 0, Math.PI*2);
                    ctx.fillStyle = '#cc3030';
                    ctx.fill();
                    // Beak
                    ctx.fillStyle = '#6a6a40';
                    ctx.beginPath();
                    ctx.moveTo(hx + Math.cos(a.facing) * 3*s, -16*s);
                    ctx.lineTo(hx + Math.cos(a.facing) * 7*s, -15.5*s);
                    ctx.lineTo(hx + Math.cos(a.facing) * 3*s, -15*s);
                    ctx.closePath();
                    ctx.fill();
                    // Eye
                    ctx.fillStyle = '#111';
                    ctx.beginPath();
                    ctx.arc(hx + Math.cos(a.facing) * 1.5*s, -16.5*s, 0.7*s, 0, Math.PI*2);
                    ctx.fill();
                    // Black tail feathers
                    ctx.fillStyle = '#1a1a1a';
                    ctx.beginPath();
                    ctx.moveTo(-6*s, -1*s);
                    ctx.lineTo(-12*s, -4*s);
                    ctx.lineTo(-10*s, 2*s);
                    ctx.closePath();
                    ctx.fill();
                    break;
                }
                case 'magpie': {
                    // Body (black and white)
                    ctx.fillStyle = '#1a1a2a';
                    ctx.beginPath();
                    ctx.ellipse(0, 0, 4*s, 2.5*s, 0, 0, Math.PI*2);
                    ctx.fill();
                    // White belly
                    ctx.fillStyle = '#f0f0f0';
                    ctx.beginPath();
                    ctx.ellipse(0, 1*s, 2.5*s, 1.5*s, 0, 0, Math.PI*2);
                    ctx.fill();
                    // Wings flapping
                    ctx.fillStyle = '#2a2a3a';
                    const wingUp = Math.sin(t * 6) * 4;
                    ctx.beginPath();
                    ctx.moveTo(-1*s, -1*s);
                    ctx.lineTo(-7*s, (-3 - wingUp)*s);
                    ctx.lineTo(-5*s, 1*s);
                    ctx.closePath();
                    ctx.fill();
                    ctx.beginPath();
                    ctx.moveTo(1*s, -1*s);
                    ctx.lineTo(7*s, (-3 - wingUp)*s);
                    ctx.lineTo(5*s, 1*s);
                    ctx.closePath();
                    ctx.fill();
                    // Long tail
                    ctx.fillStyle = '#1a1a2a';
                    ctx.beginPath();
                    ctx.moveTo(-3*s, 1*s);
                    ctx.lineTo(-9*s, 5*s);
                    ctx.lineTo(-8*s, 3*s);
                    ctx.closePath();
                    ctx.fill();
                    // Head
                    ctx.fillStyle = '#1a1a2a';
                    ctx.beginPath();
                    ctx.arc(Math.cos(a.facing) * 3*s, -2*s, 2*s, 0, Math.PI*2);
                    ctx.fill();
                    // Eye
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(Math.cos(a.facing) * 4*s, -2.5*s, 0.6*s, 0, Math.PI*2);
                    ctx.fill();
                    break;
                }
                case 'rabbit': {
                    // Body
                    ctx.fillStyle = '#c8b890';
                    ctx.beginPath();
                    ctx.ellipse(0, 0, 5*s, 3.5*s, 0, 0, Math.PI*2);
                    ctx.fill();
                    // Head
                    ctx.beginPath();
                    ctx.arc(Math.cos(a.facing) * 4*s, -2*s, 3*s, 0, Math.PI*2);
                    ctx.fill();
                    // Ears
                    ctx.fillStyle = '#d0c0a0';
                    ctx.beginPath();
                    ctx.ellipse(Math.cos(a.facing) * 3*s - 1.5*s, -7*s, 1.2*s, 3.5*s, -0.2, 0, Math.PI*2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.ellipse(Math.cos(a.facing) * 3*s + 1.5*s, -7*s, 1.2*s, 3.5*s, 0.2, 0, Math.PI*2);
                    ctx.fill();
                    // Inner ears (pink)
                    ctx.fillStyle = '#e0a0a0';
                    ctx.beginPath();
                    ctx.ellipse(Math.cos(a.facing) * 3*s - 1.5*s, -7*s, 0.6*s, 2*s, -0.2, 0, Math.PI*2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.ellipse(Math.cos(a.facing) * 3*s + 1.5*s, -7*s, 0.6*s, 2*s, 0.2, 0, Math.PI*2);
                    ctx.fill();
                    // Tail
                    ctx.fillStyle = '#e0d8c0';
                    ctx.beginPath();
                    ctx.arc(-4*s, 0, 2*s, 0, Math.PI*2);
                    ctx.fill();
                    // Eye
                    ctx.fillStyle = '#3a1a1a';
                    ctx.beginPath();
                    ctx.arc(Math.cos(a.facing) * 5.5*s, -2.5*s, 0.8*s, 0, Math.PI*2);
                    ctx.fill();
                    break;
                }
                case 'koi': {
                    // Golden koi fish
                    ctx.fillStyle = '#e8a030';
                    ctx.beginPath();
                    ctx.ellipse(0, 0, 6*s, 3*s, a.facing, 0, Math.PI*2);
                    ctx.fill();
                    // White patches
                    ctx.fillStyle = '#f0e8d0';
                    ctx.beginPath();
                    ctx.ellipse(2*s, -0.5*s, 2*s, 1.5*s, a.facing + 0.3, 0, Math.PI*2);
                    ctx.fill();
                    // Tail fin
                    ctx.fillStyle = '#d08020';
                    const tailWag = Math.sin(t * 4) * 0.3;
                    ctx.beginPath();
                    ctx.moveTo(Math.cos(a.facing + Math.PI) * 5*s, Math.sin(a.facing + Math.PI) * 5*s);
                    ctx.lineTo(Math.cos(a.facing + Math.PI + 0.5 + tailWag) * 9*s, Math.sin(a.facing + Math.PI + 0.5 + tailWag) * 9*s);
                    ctx.lineTo(Math.cos(a.facing + Math.PI - 0.5 + tailWag) * 9*s, Math.sin(a.facing + Math.PI - 0.5 + tailWag) * 9*s);
                    ctx.closePath();
                    ctx.fill();
                    // Eye
                    ctx.fillStyle = '#111';
                    ctx.beginPath();
                    ctx.arc(Math.cos(a.facing) * 3*s, Math.sin(a.facing) * 3*s - 0.5*s, 0.8*s, 0, Math.PI*2);
                    ctx.fill();
                    // Water ripple
                    ctx.strokeStyle = 'rgba(100,160,210,0.25)';
                    ctx.lineWidth = s * 0.5;
                    ctx.beginPath();
                    ctx.arc(0, 0, (7 + Math.sin(t * 2) * 2)*s, 0, Math.PI*2);
                    ctx.stroke();
                    break;
                }
                case 'cat': {
                    // Body
                    ctx.fillStyle = '#8a7050';
                    ctx.beginPath();
                    ctx.ellipse(0, 0, 5*s, 3*s, 0, 0, Math.PI*2);
                    ctx.fill();
                    // Head
                    const catHx = Math.cos(a.facing) * 4*s;
                    ctx.beginPath();
                    ctx.arc(catHx, -2*s, 3*s, 0, Math.PI*2);
                    ctx.fillStyle = '#8a7050';
                    ctx.fill();
                    // Ears (triangles)
                    ctx.fillStyle = '#7a6040';
                    ctx.beginPath();
                    ctx.moveTo(catHx - 2.5*s, -4*s);
                    ctx.lineTo(catHx - 1*s, -7*s);
                    ctx.lineTo(catHx + 0.5*s, -4*s);
                    ctx.closePath();
                    ctx.fill();
                    ctx.beginPath();
                    ctx.moveTo(catHx + 0.5*s, -4*s);
                    ctx.lineTo(catHx + 2*s, -7*s);
                    ctx.lineTo(catHx + 3.5*s, -4*s);
                    ctx.closePath();
                    ctx.fill();
                    // Eyes
                    ctx.fillStyle = '#aac030';
                    ctx.beginPath();
                    ctx.ellipse(catHx - 1*s, -2.5*s, 1*s, 0.8*s, 0, 0, Math.PI*2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.ellipse(catHx + 2*s, -2.5*s, 1*s, 0.8*s, 0, 0, Math.PI*2);
                    ctx.fill();
                    // Pupils
                    ctx.fillStyle = '#111';
                    ctx.beginPath();
                    ctx.ellipse(catHx - 1*s, -2.5*s, 0.4*s, 0.7*s, 0, 0, Math.PI*2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.ellipse(catHx + 2*s, -2.5*s, 0.4*s, 0.7*s, 0, 0, Math.PI*2);
                    ctx.fill();
                    // Tail (curved)
                    ctx.strokeStyle = '#8a7050';
                    ctx.lineWidth = 1.5*s;
                    ctx.beginPath();
                    ctx.moveTo(-4*s, 0);
                    ctx.quadraticCurveTo(-8*s, -6*s, -5*s + Math.sin(t * 2)*2*s, -8*s);
                    ctx.stroke();
                    break;
                }
                case 'butterfly': {
                    // Wings (colorful, flapping)
                    const wingFlap = Math.sin(t * 8) * 0.5;
                    const colors = ['#e06060', '#e08040', '#d0a030', '#e06080'];
                    const ci = Math.abs(Math.floor(a.x + a.y)) % colors.length;
                    ctx.fillStyle = colors[ci];
                    ctx.globalAlpha = 0.8;
                    // Left wing
                    ctx.beginPath();
                    ctx.ellipse(-2*s, -1*s, 3*s, (2 + wingFlap)*s, -0.4, 0, Math.PI*2);
                    ctx.fill();
                    // Right wing
                    ctx.beginPath();
                    ctx.ellipse(2*s, -1*s, 3*s, (2 + wingFlap)*s, 0.4, 0, Math.PI*2);
                    ctx.fill();
                    // Wing dots
                    ctx.fillStyle = '#fff';
                    ctx.globalAlpha = 0.5;
                    ctx.beginPath();
                    ctx.arc(-2*s, -1*s, 1*s, 0, Math.PI*2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(2*s, -1*s, 1*s, 0, Math.PI*2);
                    ctx.fill();
                    ctx.globalAlpha = 1;
                    // Body
                    ctx.fillStyle = '#2a2a2a';
                    ctx.beginPath();
                    ctx.ellipse(0, 0, 0.8*s, 2.5*s, 0, 0, Math.PI*2);
                    ctx.fill();
                    // Antennae
                    ctx.strokeStyle = '#2a2a2a';
                    ctx.lineWidth = 0.4*s;
                    ctx.beginPath();
                    ctx.moveTo(0, -2*s);
                    ctx.lineTo(-2*s, -4*s);
                    ctx.moveTo(0, -2*s);
                    ctx.lineTo(2*s, -4*s);
                    ctx.stroke();
                    break;
                }
            }
            ctx.restore();
        }
    }

    // NPC chatter — short "stone-age" phrases (uses the generated vocab)
    function npcChatter() {
        const concepts = Object.keys(vocab);
        if (concepts.length === 0) return '...';
        const len = randInt(1, 3);
        const words = [];
        for (let i = 0; i < len; i++) {
            const c = randEl(concepts);
            words.push(vocab[c].hanzi);
        }
        const endings = ['！', '。', '？', '！！', '……'];
        return words.join('') + randEl(endings);
    }

    function updateNPCs(dt) {
        for (const npc of npcs) {
            switch (npc.state) {
                case 'idle':
                    npc.idleTimer -= dt;
                    npc.activityDe = 'Untätig';
                    if (npc.idleTimer <= 0) {
                        // Decide: wander or try to chat
                        const chatChance = 0.35;
                        let startedChat = false;

                        if (Math.random() < chatChance) {
                            // Find another NPC nearby to chat with (weighted by relationship)
                            const candidates = npcs.filter(other =>
                                other !== npc &&
                                other.state === 'idle' &&
                                npc.distTo(other.x, other.y) < 120
                            );
                            let partner = null;
                            if (candidates.length > 0) {
                                const weights = candidates.map(c => 1 + (npc.relationships[c.name] || 0) * 0.05);
                                const total = weights.reduce((s, w) => s + w, 0);
                                let r = Math.random() * total;
                                for (let ci = 0; ci < candidates.length; ci++) {
                                    r -= weights[ci];
                                    if (r <= 0) { partner = candidates[ci]; break; }
                                }
                                if (!partner) partner = candidates[candidates.length - 1];
                            }
                            if (partner) {
                                npc.state = 'chatting';
                                npc.chatTimer = randFloat(80, 200);
                                npc.chatPartner = partner;
                                partner.state = 'chatting';
                                partner.chatTimer = npc.chatTimer;
                                partner.chatPartner = npc;
                                npc.activityDe = 'Redet';
                                partner.activityDe = 'Redet';

                                // Face each other
                                npc.facing = Math.atan2(partner.y - npc.y, partner.x - npc.x);
                                partner.facing = Math.atan2(npc.y - partner.y, npc.x - partner.x);

                                // First bubble
                                const text = npcChatter();
                                npcBubbles.push(new SpeechBubble(npc, text, [], false));
                                // Boost relationship between chatting NPCs
                                npc.relationships[partner.name] = Math.min(100, (npc.relationships[partner.name] || 0) + 3);
                                partner.relationships[npc.name] = Math.min(100, (partner.relationships[npc.name] || 0) + 3);
                                startedChat = true;
                            }
                        }

                        if (!startedChat) {
                            // Wander to a random nearby point
                            npc.state = 'moving';
                            npc.targetX = Math.max(40, Math.min(WORLD_W - 40, npc.x + randFloat(-120, 120)));
                            npc.targetY = Math.max(40, Math.min(WORLD_H - 40, npc.y + randFloat(-120, 120)));
                            npc.activityDe = 'Geht umher';
                        }
                    }
                    break;

                case 'moving':
                    if (npc.moveToward(npc.targetX, npc.targetY, dt)) {
                        npc.state = 'idle';
                        npc.idleTimer = randFloat(80, 400);
                    }
                    break;

                case 'chatting':
                    npc.chatTimer -= dt;
                    // Occasional new bubble while chatting
                    if (Math.random() < 0.003 * dt) {
                        const text = npcChatter();
                        npcBubbles.push(new SpeechBubble(npc, text, [], false));
                    }
                    if (npc.chatTimer <= 0) {
                        npc.state = 'idle';
                        npc.idleTimer = randFloat(100, 350);
                        npc.chatPartner = null;
                        // Wander away after chat
                        if (Math.random() < 0.5) {
                            npc.state = 'moving';
                            npc.targetX = Math.max(40, Math.min(WORLD_W - 40, npc.x + randFloat(-100, 100)));
                            npc.targetY = Math.max(40, Math.min(WORLD_H - 40, npc.y + randFloat(-100, 100)));
                        }
                    }
                    break;
            }
        }

        // Update NPC bubbles
        npcBubbles = npcBubbles.filter(b => b.update(dt));
    }

    // ============================================================
    //  EMERGENT RELATIONSHIPS
    // ============================================================
    function updateRelationships(dt) {
        const allChars = [...persons, ...npcs];
        const fire = worldObjects.find(o => o.type === 'teahouse');

        // Near-teahouse bonding: characters near the same fire grow closer
        if (fire) {
            const nearFire = allChars.filter(c => {
                const d = Math.sqrt((c.x - fire.x) ** 2 + (c.y - fire.y) ** 2);
                return d < 60;
            });
            for (let i = 0; i < nearFire.length; i++) {
                for (let j = i + 1; j < nearFire.length; j++) {
                    const a = nearFire[i], b = nearFire[j];
                    const aName = a.name, bName = b.name;
                    a.relationships[bName] = Math.min(100, (a.relationships[bName] || 0) + 0.3 * dt * 0.016);
                    b.relationships[aName] = Math.min(100, (b.relationships[aName] || 0) + 0.3 * dt * 0.016);
                }
            }
        }

        // NPC follow behavior: NPCs with high relationship to speaker occasionally drift toward them
        const speaker = persons[0];
        for (const npc of npcs) {
            const rel = npc.relationships[speaker.name] || 0;
            if (rel > 50 && npc.state === 'idle' && Math.random() < 0.0003 * dt * (rel / 100)) {
                npc.state = 'moving';
                npc.targetX = speaker.x + randFloat(-40, 40);
                npc.targetY = speaker.y + randFloat(-40, 40);
                npc.targetX = Math.max(40, Math.min(WORLD_W - 40, npc.targetX));
                npc.targetY = Math.max(40, Math.min(WORLD_H - 40, npc.targetY));
                npc.activityDe = 'Folgt ' + speaker.name;
            }
        }

        // Learner return speed influenced by relationship
        const learner = persons[1];
        const relToSpeaker = learner.relationships[speaker.name] || 0;
        if (learner.followMode === 'returning' && relToSpeaker > 40) {
            // Slightly faster return (processed in learner AI via relationship boost)
        }
    }

    function boostRelationshipsNearby(actor, amount) {
        const allChars = [...persons, ...npcs];
        for (const c of allChars) {
            if (c === actor) continue;
            const d = Math.sqrt((c.x - actor.x) ** 2 + (c.y - actor.y) ** 2);
            if (d < 80) {
                actor.relationships[c.name] = Math.min(100, (actor.relationships[c.name] || 0) + amount);
                c.relationships[actor.name] = Math.min(100, (c.relationships[actor.name] || 0) + amount * 0.5);
            }
        }
    }

    function drawRelationshipIndicators(ctx) {
        const allChars = [...persons, ...npcs];
        for (let i = 0; i < allChars.length; i++) {
            for (let j = i + 1; j < allChars.length; j++) {
                const a = allChars[i], b = allChars[j];
                const rel = Math.max(a.relationships[b.name] || 0, b.relationships[a.name] || 0);
                if (rel < 60) continue;
                const d = Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2);
                if (d > 80) continue;
                const alpha = Math.min(0.25, (rel - 60) / 160);
                ctx.save();
                ctx.strokeStyle = `rgba(255,220,120,${alpha})`;
                ctx.lineWidth = canvasScale * 1.5;
                ctx.setLineDash([3 * canvasScale, 4 * canvasScale]);
                ctx.beginPath();
                ctx.moveTo(a.x * canvasScale, (a.y - 5) * canvasScale);
                ctx.lineTo(b.x * canvasScale, (b.y - 5) * canvasScale);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.restore();
            }
        }
    }

    // ============================================================
    //  WEATHER & DAY/NIGHT SYSTEM
    // ============================================================
    function getSeason() {
        const seasonIdx = Math.floor((gameDay - 1) / 10) % 4;
        return ['spring', 'summer', 'autumn', 'winter'][seasonIdx];
    }

    function getWeatherPool() {
        switch(getSeason()) {
            case 'spring': return ['clear','clear','rain','rain','wind','fog'];
            case 'summer': return ['clear','clear','clear','clear','rain'];
            case 'autumn': return ['clear','rain','rain','wind','wind','fog'];
            case 'winter': return ['clear','snow','snow','snow','wind','fog'];
            default: return ['clear'];
        }
    }

    function changeWeather() {
        previousWeather = currentWeather;
        const pool = getWeatherPool();
        currentWeather = randEl(pool);
        targetWeatherIntensity = currentWeather === 'clear' ? 0 : randFloat(0.3, 1.0);
        nextWeatherChange = randFloat(1500, 3500);

        // Speaker comments on weather change
        if (currentWeather !== previousWeather && currentWeather !== 'clear' && persons.length > 0) {
            let weatherConcepts = [];
            switch(currentWeather) {
                case 'rain': weatherConcepts = ['rain','water','cold']; break;
                case 'snow': weatherConcepts = ['cold','wind','white']; break;
                case 'wind': weatherConcepts = ['wind','fast']; break;
                case 'fog': weatherConcepts = ['look','quiet']; break;
            }
            const validConcepts = weatherConcepts.filter(c => vocab[c]);
            if (validConcepts.length >= 1) {
                const chosen = validConcepts.slice(0, randInt(1, 2));
                const words = chosen.map(c => ({ conceptId: c, hanzi: vocab[c].hanzi, pinyin: vocab[c].pinyin, de: vocab[c].de }));
                const hanziText = words.map(w => w.hanzi).join('') + '!';
                const pinyinText = words.map(w => w.pinyin).join(' ') + '!';
                const wBubble = new SpeechBubble(persons[0], hanziText, words, false);
                wBubble.hanziText = hanziText;
                wBubble.pinyinText = pinyinText;
                speechBubbles.push(wBubble);
                sfx('speak');
                addLog(`${persons[0].name}: "${hanziText}" (Wetter)`, 'speak');

                const learner = persons[1];
                if (learner.distTo(persons[0].x, persons[0].y) <= learner.hearingRange) {
                    for (const w of words) {
                        if (!learner.knownWords.has(w.conceptId)) {
                            if (Math.random() < learner.learnChance) {
                                learnWord(learner, w);
                            }
                        }
                    }
                }
            }
        }
    }

    function updateWeather(dt) {
        nextWeatherChange -= dt;
        if (nextWeatherChange <= 0) changeWeather();

        // Smooth intensity transition
        const step = 0.002 * dt;
        if (weatherIntensity < targetWeatherIntensity) {
            weatherIntensity = Math.min(targetWeatherIntensity, weatherIntensity + step);
        } else if (weatherIntensity > targetWeatherIntensity) {
            weatherIntensity = Math.max(targetWeatherIntensity, weatherIntensity - step);
        }

        // Spawn & update particles
        if (currentWeather === 'clear' && weatherIntensity < 0.05) { weatherParticles = []; return; }

        const spawnRate = weatherIntensity * (currentWeather === 'rain' ? 3 : currentWeather === 'snow' ? 2 : 1);
        for (let i = 0; i < spawnRate * dt * 0.3; i++) {
            if (weatherParticles.length > 300) break;
            switch(currentWeather) {
                case 'rain':
                    weatherParticles.push({ x: randFloat(-20, WORLD_W+20), y: randFloat(-40,-5), vx: randFloat(-0.5,-0.2), vy: randFloat(3,5), size: randFloat(1,2) });
                    break;
                case 'snow':
                    weatherParticles.push({ x: randFloat(-20, WORLD_W+20), y: randFloat(-20,-5), vx: randFloat(-0.3,0.3), vy: randFloat(0.3,0.8), size: randFloat(1.5,3.5), phase: randFloat(0,Math.PI*2) });
                    break;
                case 'wind':
                    weatherParticles.push({ x: randFloat(-20,0), y: randFloat(0,WORLD_H), vx: randFloat(2,4), vy: randFloat(-0.5,0.5), life: randFloat(40,100), size: randFloat(0.5,1.5) });
                    break;
                case 'fog':
                    if (weatherParticles.length < 40)
                        weatherParticles.push({ x: randFloat(0,WORLD_W), y: randFloat(0,WORLD_H), size: randFloat(30,80), phase: randFloat(0,Math.PI*2), vx: randFloat(-0.1,0.1), alpha: randFloat(0.03,0.08) });
                    break;
            }
        }

        for (const p of weatherParticles) {
            if (currentWeather === 'rain') { p.x += p.vx * dt; p.y += p.vy * dt; }
            else if (currentWeather === 'snow') { p.x += Math.sin(gameTick*0.02 + p.phase)*0.3*dt + p.vx*dt; p.y += p.vy * dt; }
            else if (currentWeather === 'wind') { p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt; }
            else if (currentWeather === 'fog') { p.x += p.vx * dt; p.phase += 0.01 * dt; }
        }

        weatherParticles = weatherParticles.filter(p => {
            if (p.life !== undefined && p.life <= 0) return false;
            return p.x >= -30 && p.x <= WORLD_W+30 && p.y >= -40 && p.y <= WORLD_H+20;
        });
    }

    function drawWeatherEffects(ctx) {
        if (weatherIntensity < 0.02) return;
        ctx.save();
        ctx.globalAlpha = weatherIntensity;
        switch(currentWeather) {
            case 'rain':
                ctx.strokeStyle = 'rgba(150,180,220,0.6)';
                ctx.lineWidth = canvasScale * 0.8;
                for (const p of weatherParticles) {
                    ctx.beginPath();
                    ctx.moveTo(p.x*canvasScale, p.y*canvasScale);
                    ctx.lineTo((p.x+p.vx*2)*canvasScale, (p.y+p.vy*2)*canvasScale);
                    ctx.stroke();
                }
                break;
            case 'snow':
                ctx.fillStyle = '#fff';
                for (const p of weatherParticles) {
                    ctx.globalAlpha = weatherIntensity * 0.8;
                    ctx.beginPath();
                    ctx.arc(p.x*canvasScale, p.y*canvasScale, p.size*canvasScale, 0, Math.PI*2);
                    ctx.fill();
                }
                break;
            case 'wind':
                ctx.strokeStyle = 'rgba(180,180,150,0.4)';
                ctx.lineWidth = canvasScale * 0.5;
                for (const p of weatherParticles) {
                    const a = p.life > 20 ? 0.4 : p.life / 50;
                    ctx.globalAlpha = weatherIntensity * a;
                    ctx.beginPath();
                    ctx.moveTo(p.x*canvasScale, p.y*canvasScale);
                    ctx.lineTo((p.x - p.vx*4)*canvasScale, (p.y - p.vy*4)*canvasScale);
                    ctx.stroke();
                }
                break;
            case 'fog':
                for (const p of weatherParticles) {
                    ctx.globalAlpha = p.alpha * weatherIntensity;
                    ctx.fillStyle = 'rgba(200,200,190,1)';
                    ctx.beginPath();
                    ctx.ellipse(p.x*canvasScale, p.y*canvasScale, p.size*canvasScale, p.size*0.5*canvasScale, 0, 0, Math.PI*2);
                    ctx.fill();
                }
                break;
        }
        ctx.restore();
    }

    function drawDayNightOverlay(ctx) {
        const cw = canvas.width / dpr;
        const ch = canvas.height / dpr;
        let overlayColor = null;
        let alpha = 0;

        if (gameHour >= 20 || gameHour < 5) {
            overlayColor = '20,20,60';
            alpha = 0.45;
            if (gameHour >= 20 && gameHour < 21) alpha = 0.45 * (gameHour - 20);
            if (gameHour >= 4 && gameHour < 5) alpha = 0.45 * (5 - gameHour);
        } else if (gameHour >= 5 && gameHour < 7) {
            overlayColor = '200,120,50';
            alpha = 0.15 * (1 - (gameHour - 5) / 2);
        } else if (gameHour >= 18 && gameHour < 20) {
            overlayColor = '200,80,30';
            alpha = 0.2 * ((gameHour - 18) / 2);
        }

        if (overlayColor && alpha > 0.01) {
            ctx.save();
            ctx.fillStyle = `rgba(${overlayColor},${alpha})`;
            ctx.fillRect(0, 0, cw, ch);
            ctx.restore();
        }

        // Stars at night
        if (gameHour >= 21 || gameHour < 4) {
            const nightAlpha = gameHour >= 21 ? Math.min(1, (gameHour - 21) / 2) : gameHour < 3 ? 1 : (4 - gameHour);
            ctx.save();
            ctx.fillStyle = '#fff';
            const stars = [[50,20],[180,45],[340,15],[500,30],[650,50],[780,25],[120,60],[400,55],[600,10],[820,45],
                           [70,35],[250,8],[460,48],[580,22],[720,55],[850,12],[160,52],[380,38],[530,5],[690,42]];
            for (const [sx,sy] of stars) {
                const twinkle = Math.sin(gameTick * 0.03 + sx * 0.1) * 0.5 + 0.5;
                ctx.globalAlpha = nightAlpha * 0.4 * twinkle;
                ctx.beginPath();
                ctx.arc(sx*canvasScale, sy*canvasScale, (1+twinkle)*canvasScale, 0, Math.PI*2);
                ctx.fill();
            }
            ctx.restore();
        }

        // Rain darkening
        if (currentWeather === 'rain' && weatherIntensity > 0.1) {
            ctx.save();
            ctx.fillStyle = `rgba(30,40,50,${weatherIntensity * 0.15})`;
            ctx.fillRect(0, 0, cw, ch);
            ctx.restore();
        }
    }
