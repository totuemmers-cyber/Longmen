    function checkCampMilestones() {
        for (const m of CAMP_MILESTONES) {
            if (campMilestonesHit.has(m.id)) continue;
            let met = true;
            for (const [action, count] of Object.entries(m.req)) {
                if ((campProgress[action] || 0) < count) { met = false; break; }
            }
            if (met) {
                campMilestonesHit.add(m.id);
                campDecorations.push({ id: m.id, x: m.x, y: m.y });
                addLog(`Die Stadt waechst: ${m.desc}`, 'speak');
            }
        }
    }

    function drawCampDecorations(ctx) {
        for (const d of campDecorations) {
            const x = d.x * canvasScale;
            const y = d.y * canvasScale;
            const s = canvasScale;

            ctx.save();
            switch (d.id) {
                case 'bamboo_stack':
                    // Bundled bamboo poles
                    ctx.fillStyle = '#4a8a3a';
                    for (let i = 0; i < 5; i++) {
                        ctx.fillRect(x + (i*3 - 6)*s, y - 12*s, 2.5*s, 18*s);
                    }
                    ctx.fillStyle = '#3a7a2a';
                    for (let i = 0; i < 5; i++) {
                        ctx.beginPath();
                        ctx.arc(x + (i*3 - 5)*s, y - 12*s, 1.2*s, 0, Math.PI*2);
                        ctx.fill();
                    }
                    // Binding rope
                    ctx.strokeStyle = '#8a7050';
                    ctx.lineWidth = 1*s;
                    ctx.beginPath();
                    ctx.moveTo(x - 7*s, y - 4*s);
                    ctx.lineTo(x + 10*s, y - 4*s);
                    ctx.stroke();
                    break;
                case 'brush_rack':
                    // Wooden rack with hanging brushes
                    ctx.strokeStyle = '#5a3a1a';
                    ctx.lineWidth = 1.5*s;
                    ctx.beginPath();
                    ctx.moveTo(x - 10*s, y + 5*s); ctx.lineTo(x - 8*s, y - 10*s);
                    ctx.moveTo(x + 10*s, y + 5*s); ctx.lineTo(x + 8*s, y - 10*s);
                    ctx.moveTo(x - 9*s, y - 8*s); ctx.lineTo(x + 9*s, y - 8*s);
                    ctx.stroke();
                    // Brushes hanging down
                    for (let i = -2; i <= 2; i++) {
                        ctx.fillStyle = '#5a3a1a';
                        ctx.fillRect(x + i*4*s - 0.5*s, y - 8*s, 1*s, 8*s);
                        ctx.fillStyle = '#2a2a2a';
                        ctx.beginPath();
                        ctx.moveTo(x + i*4*s - 1*s, y);
                        ctx.lineTo(x + i*4*s, y + 3*s);
                        ctx.lineTo(x + i*4*s + 1*s, y);
                        ctx.closePath();
                        ctx.fill();
                    }
                    break;
                case 'tea_drying':
                    // Flat bamboo trays with tea leaves
                    ctx.fillStyle = '#a08a50';
                    ctx.beginPath();
                    ctx.ellipse(x, y, 12*s, 4*s, 0, 0, Math.PI*2);
                    ctx.fill();
                    ctx.strokeStyle = '#8a7040';
                    ctx.lineWidth = 0.5*s;
                    ctx.stroke();
                    // Tea leaves
                    ctx.fillStyle = '#3a6a2a';
                    for (let i = 0; i < 8; i++) {
                        const lx = x + (Math.sin(i * 2.7) * 8)*s;
                        const ly = y + (Math.cos(i * 3.1) * 2)*s;
                        ctx.beginPath();
                        ctx.ellipse(lx, ly, 1.5*s, 0.8*s, i * 0.5, 0, Math.PI*2);
                        ctx.fill();
                    }
                    break;
                case 'fish_basket':
                    // Woven basket with fish
                    ctx.fillStyle = '#8a7040';
                    ctx.beginPath();
                    ctx.ellipse(x, y + 2*s, 7*s, 5*s, 0, 0, Math.PI*2);
                    ctx.fill();
                    // Weave pattern
                    ctx.strokeStyle = '#7a6030';
                    ctx.lineWidth = 0.5*s;
                    for (let i = -2; i <= 2; i++) {
                        ctx.beginPath();
                        ctx.moveTo(x + i*3*s, y - 3*s);
                        ctx.lineTo(x + i*3*s, y + 7*s);
                        ctx.stroke();
                    }
                    // Fish poking out
                    ctx.fillStyle = '#7a9aaa';
                    ctx.beginPath();
                    ctx.ellipse(x - 2*s, y - 2*s, 3*s, 1.5*s, -0.3, 0, Math.PI*2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.ellipse(x + 3*s, y - 1*s, 2.5*s, 1.2*s, 0.2, 0, Math.PI*2);
                    ctx.fill();
                    break;
                case 'ink_set':
                    // Ink stone (black rectangle) + ink stick
                    ctx.fillStyle = '#2a2a2a';
                    ctx.fillRect(x - 5*s, y - 2*s, 10*s, 6*s);
                    ctx.fillStyle = '#3a3a3a';
                    ctx.fillRect(x - 4*s, y - 1*s, 8*s, 4*s);
                    // Ink pool
                    ctx.fillStyle = '#1a1a1a';
                    ctx.beginPath();
                    ctx.ellipse(x + 1*s, y + 1*s, 3*s, 1.5*s, 0, 0, Math.PI*2);
                    ctx.fill();
                    // Ink stick
                    ctx.fillStyle = '#1a1a2a';
                    ctx.save();
                    ctx.translate(x + 8*s, y);
                    ctx.rotate(0.3);
                    ctx.fillRect(-1*s, -4*s, 2*s, 8*s);
                    ctx.restore();
                    break;
                case 'lantern_circle':
                    // Circle of red lanterns on poles
                    for (let i = 0; i < 6; i++) {
                        const angle = (i / 6) * Math.PI * 2;
                        const lx = x + Math.cos(angle) * 16*s;
                        const ly = y + Math.sin(angle) * 12*s;
                        // Pole
                        ctx.strokeStyle = '#5a3a1a';
                        ctx.lineWidth = 1*s;
                        ctx.beginPath();
                        ctx.moveTo(lx, ly + 3*s);
                        ctx.lineTo(lx, ly - 8*s);
                        ctx.stroke();
                        // Lantern
                        ctx.fillStyle = '#cc3030';
                        ctx.beginPath();
                        ctx.ellipse(lx, ly - 10*s, 2.5*s, 3.5*s, 0, 0, Math.PI*2);
                        ctx.fill();
                        // Gold trim
                        ctx.strokeStyle = '#d4a030';
                        ctx.lineWidth = 0.5*s;
                        ctx.beginPath();
                        ctx.moveTo(lx - 2.5*s, ly - 10*s);
                        ctx.lineTo(lx + 2.5*s, ly - 10*s);
                        ctx.stroke();
                    }
                    break;
                case 'roof_tiles':
                    // Stack of curved roof tiles
                    ctx.fillStyle = '#5a5a5a';
                    for (let row = 0; row < 3; row++) {
                        for (let col = 0; col < 4 - row; col++) {
                            const tx = x + (col - (3 - row) / 2) * 5*s;
                            const ty = y + (row * 4 - 2)*s;
                            ctx.beginPath();
                            ctx.arc(tx, ty, 2.5*s, Math.PI, 0);
                            ctx.fill();
                            ctx.fillStyle = '#4a4a4a';
                            ctx.fillRect(tx - 2.5*s, ty, 5*s, 1.5*s);
                            ctx.fillStyle = '#5a5a5a';
                        }
                    }
                    break;
                case 'rice_sacks':
                    // Burlap sacks of rice
                    ctx.fillStyle = '#b0a070';
                    for (let i = -1; i <= 1; i++) {
                        ctx.beginPath();
                        ctx.ellipse(x + i*7*s, y + 2*s, 4*s, 5*s, 0, 0, Math.PI*2);
                        ctx.fill();
                    }
                    // Tied tops
                    ctx.strokeStyle = '#8a7050';
                    ctx.lineWidth = 1*s;
                    for (let i = -1; i <= 1; i++) {
                        ctx.beginPath();
                        ctx.moveTo(x + i*7*s - 2*s, y - 3*s);
                        ctx.lineTo(x + i*7*s, y - 5*s);
                        ctx.lineTo(x + i*7*s + 2*s, y - 3*s);
                        ctx.stroke();
                    }
                    break;
                case 'silk_canopy':
                    // Red silk cloth draped between two poles
                    ctx.strokeStyle = '#5a3a1a';
                    ctx.lineWidth = 1.5*s;
                    ctx.beginPath();
                    ctx.moveTo(x - 12*s, y + 6*s); ctx.lineTo(x - 10*s, y - 10*s);
                    ctx.moveTo(x + 12*s, y + 6*s); ctx.lineTo(x + 10*s, y - 10*s);
                    ctx.stroke();
                    // Silk drape
                    ctx.fillStyle = 'rgba(200,50,50,0.6)';
                    ctx.beginPath();
                    ctx.moveTo(x - 10*s, y - 10*s);
                    ctx.quadraticCurveTo(x, y - 4*s, x + 10*s, y - 10*s);
                    ctx.lineTo(x + 10*s, y - 8*s);
                    ctx.quadraticCurveTo(x, y - 2*s, x - 10*s, y - 8*s);
                    ctx.closePath();
                    ctx.fill();
                    // Gold tassels
                    ctx.strokeStyle = '#d4a030';
                    ctx.lineWidth = 0.8*s;
                    for (let i = -2; i <= 2; i++) {
                        ctx.beginPath();
                        ctx.moveTo(x + i*4*s, y - 3*s);
                        ctx.lineTo(x + i*4*s, y + 1*s);
                        ctx.stroke();
                    }
                    break;
                case 'ceramic_set':
                    // Row of ceramic pots and vases
                    // Large pot
                    ctx.fillStyle = '#b08050';
                    ctx.beginPath();
                    ctx.ellipse(x - 6*s, y + 2*s, 4*s, 4*s, 0, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = '#a07040';
                    ctx.fillRect(x - 8*s, y - 2*s, 4*s, 1.5*s);
                    // Medium vase
                    ctx.fillStyle = '#c0a060';
                    ctx.beginPath();
                    ctx.ellipse(x + 2*s, y + 1*s, 3*s, 4*s, 0, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillRect(x + 0.5*s, y - 4*s, 3*s, 2*s);
                    // Small cup
                    ctx.fillStyle = '#d0b070';
                    ctx.beginPath();
                    ctx.ellipse(x + 9*s, y + 3*s, 2.5*s, 2.5*s, 0, 0, Math.PI*2);
                    ctx.fill();
                    // Blue glaze pattern on large pot
                    ctx.strokeStyle = '#4060a0';
                    ctx.lineWidth = 0.5*s;
                    ctx.beginPath();
                    ctx.arc(x - 6*s, y + 2*s, 2.5*s, 0, Math.PI*2);
                    ctx.stroke();
                    break;
            }
            ctx.restore();
        }
    }

    // ============================================================
    //  PERSON CLASS
    // ============================================================
    class Person {
        constructor(name, role, color) {
            this.name = name;
            this.role = role; // 'speaker' or 'learner'
            this.color = color;

            // Random attributes 1-10
            this.geschick = randInt(1, 10);      // Dexterity: movement speed + action speed
            this.neugier = randInt(1, 10);       // Curiosity: wander tendency + action variety
            this.geselligkeit = randInt(1, 10);  // Sociability: social actions + staying close
            this.wahrnehmung = randInt(1, 10);   // Perception: hearing range + learn chance

            // Appearance — Song Dynasty Chinese / German traveler
            const skinTones = ['#e8c8a0','#d4b088','#e0c098','#dab890','#e8d0a8','#d0a880'];
            const hairColors = ['#1a1008','#0a0a08','#1a1a10','#2a1a10'];
            const clothColors_s = ['#4a6a8a','#6a3030','#3a5a3a','#8a6a30']; // Chinese robes
            const clothColors_l = ['#6a5a40','#5a4a30','#7a6a50']; // German traveler clothing
            this.skinTone = randEl(skinTones);
            this.hairColor = randEl(hairColors);
            this.clothColor = randEl(role === 'speaker' ? clothColors_s : clothColors_l);

            // Position
            this.x = role === 'speaker' ? 400 : 440;
            this.y = role === 'speaker' ? 300 : 320;
            this.targetX = this.x;
            this.targetY = this.y;
            this.facing = 0; // angle

            // Needs (0-100, 100 = full)
            this.hunger = 70 + randInt(0, 30);
            this.thirst = 70 + randInt(0, 30);
            this.energy = 60 + randInt(0, 40);

            // State
            this.state = 'idle'; // idle, moving, acting, speaking
            this.currentAction = null;
            this.actionTimer = 0;
            this.idleTimer = randInt(30, 120);
            this.activityDe = 'Untätig';

            // Spaced repetition: track action history for variety
            this.actionHistory = []; // recent action IDs (newest first)
            this.actionHistoryMax = 12; // remember last N actions

            // Learner follow behavior
            this.followMode = 'following'; // 'following', 'wandering', 'returning'
            this.wanderTimer = 0;
            this.followTimer = randInt(300, 800);  // time before considering a wander
            this.returnUrgency = 0;

            // Learning (only for learner)
            this.knownWords = new Set();
            this.wordHistory = []; // for UI display order

            // Relationships (name → score 0-100)
            this.relationships = {};
        }

        get moveSpeed() {
            return 0.6 + this.geschick * 0.18;
        }

        get needDecayRate() {
            // Higher geschick = slightly slower decay (skilled people are more efficient)
            return 0.005 / (0.5 + this.geschick * 0.06);
        }

        get learnChance() {
            // Perception is the primary driver of learning ability (reduced by 1/3)
            return (this.wahrnehmung * 0.08 + 0.05) * 0.667;
        }

        get hearingRange() {
            // Perception affects how far the learner can hear the speaker
            return 120 + this.wahrnehmung * 12;
        }

        get wanderChance() {
            // Curiosity drives how often the learner wanders off
            return 0.04 + this.neugier * 0.016;
        }

        get socialWeight() {
            // Sociability affects social action preference (0.5 - 2.0 range)
            return 0.5 + this.geselligkeit * 0.15;
        }

        update(dt) {
            // Decay needs
            this.hunger -= this.needDecayRate * dt;
            this.thirst -= this.needDecayRate * dt * 1.2;
            if (this.state === 'acting' && this.currentAction && this.currentAction.id !== 'sleep_house') {
                this.energy -= this.needDecayRate * dt * 0.8;
            } else if (this.state === 'idle') {
                this.energy += 0.003 * dt;
            }
            this.hunger = Math.max(0, Math.min(100, this.hunger));
            this.thirst = Math.max(0, Math.min(100, this.thirst));
            this.energy = Math.max(0, Math.min(100, this.energy));
        }

        distTo(ox, oy) {
            return Math.sqrt((this.x - ox) ** 2 + (this.y - oy) ** 2);
        }

        moveToward(tx, ty, dt) {
            const dx = tx - this.x;
            const dy = ty - this.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 3) return true;
            const spd = this.moveSpeed * dt * 0.4;
            const step = Math.min(spd, dist);
            this.x += (dx / dist) * step;
            this.y += (dy / dist) * step;
            this.facing = Math.atan2(dy, dx);
            return dist < 8;
        }
    }

    // ============================================================
    //  SPEECH BUBBLE
    // ============================================================
    class SpeechBubble {
        constructor(person, text, conceptWords, isResponse) {
            this.person = person;
            this.text = text;
            this.hanziText = text; // may be overridden
            this.pinyinText = '';  // may be set
            this.conceptWords = conceptWords || [];
            this.isResponse = isResponse || false;
            this.life = 240;
            this.maxLife = 240;
            this.alpha = 0;
        }
        update(dt) {
            this.life -= dt * 0.5;
            if (this.life > this.maxLife - 30) {
                this.alpha = Math.min(1, this.alpha + 0.08 * dt);
            } else if (this.life < 40) {
                this.alpha = Math.max(0, this.life / 40);
            } else {
                this.alpha = 1;
            }
            return this.life > 0;
        }
        draw(ctx) {
            if (this.alpha <= 0) return;
            const x = this.person.x * canvasScale;
            const yOff = this.isResponse ? -60 : -48;
            const y = (this.person.y + yOff) * canvasScale;
            const CJK_FONT = "'Microsoft YaHei','PingFang SC','Noto Sans SC',sans-serif";
            ctx.save();
            ctx.globalAlpha = this.alpha;

            // Measure widths for both lines
            const hasPinyin = this.pinyinText && !this.isResponse;
            const hanziFontSize = Math.round(13 * canvasScale);
            const pinyinFontSize = Math.round(9 * canvasScale);
            ctx.font = `bold ${hanziFontSize}px ${CJK_FONT}`;
            const hanziW = ctx.measureText(this.hanziText).width;
            let pinyinW = 0;
            if (hasPinyin) {
                ctx.font = `${pinyinFontSize}px 'Courier New',${CJK_FONT}`;
                pinyinW = ctx.measureText(this.pinyinText).width;
            }

            const pad = 8 * canvasScale;
            const tw = Math.max(hanziW, pinyinW);
            const bw = tw + pad * 2;
            const bh = (hasPinyin ? 34 : 22) * canvasScale;
            const bx = x - bw / 2;
            const by = y - bh;

            // Bubble bg
            ctx.fillStyle = this.isResponse ? '#2a2a1a' : '#f5f0e0';
            ctx.strokeStyle = this.isResponse ? '#6a8a5a' : '#c83030';
            ctx.lineWidth = canvasScale;
            roundRect(ctx, bx, by, bw, bh, 4 * canvasScale);
            ctx.fill();
            ctx.stroke();

            // Pointer
            ctx.beginPath();
            ctx.moveTo(x - 4 * canvasScale, by + bh);
            ctx.lineTo(x, by + bh + 6 * canvasScale);
            ctx.lineTo(x + 4 * canvasScale, by + bh);
            ctx.fillStyle = this.isResponse ? '#2a2a1a' : '#f5f0e0';
            ctx.fill();

            ctx.textAlign = 'center';
            if (hasPinyin) {
                // Hanzi line (top, larger)
                ctx.font = `bold ${hanziFontSize}px ${CJK_FONT}`;
                ctx.fillStyle = '#2a2010';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.hanziText, x, by + bh * 0.35);
                // Pinyin line (bottom, smaller, grey)
                ctx.font = `${pinyinFontSize}px 'Courier New',${CJK_FONT}`;
                ctx.fillStyle = '#8a7e6a';
                ctx.fillText(this.pinyinText, x, by + bh * 0.72);
            } else {
                // Single line (response bubble or fallback)
                ctx.font = `bold ${Math.round(11 * canvasScale)}px 'Courier New',${CJK_FONT}`;
                ctx.fillStyle = this.isResponse ? '#a0c890' : '#2a2010';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.text, x, by + bh / 2);
            }
            ctx.restore();
        }
    }

    function roundRect(ctx, x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
    }

    // ============================================================
    //  LEARN FLASH (visual feedback)
    // ============================================================
    class LearnFlash {
        constructor(x, y, word) {
            this.x = x;
            this.y = y;
            this.word = word;
            this.life = 90;
            this.vy = -0.5;
        }
        update(dt) {
            this.y += this.vy * dt;
            this.life -= dt;
            return this.life > 0;
        }
        draw(ctx) {
            const alpha = Math.min(1, this.life / 40);
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.font = `bold ${Math.round(10 * canvasScale)}px 'Courier New','Microsoft YaHei','PingFang SC','Noto Sans SC',monospace`;
            ctx.fillStyle = '#4ade4a';
            ctx.textAlign = 'center';
            ctx.fillText('+ ' + this.word, this.x * canvasScale, this.y * canvasScale);
            ctx.restore();
        }
    }

    // ============================================================
    //  CALLIGRAPHY OVERLAY (书法 shūfǎ — brush stroke animation)
    // ============================================================
    const CJK_FONT = "'Microsoft YaHei','PingFang SC','Noto Sans SC','Noto Sans CJK SC',sans-serif";
    const INK_COLOR = '#1a0a00';
    const PARCHMENT_BG = '#f5e6c8';
    const PARCHMENT_BORDER = '#c4a46a';

    class CalligraphyOverlay {
        constructor(hanzi, pinyin, german) {
            this.hanzi = hanzi;
            this.pinyin = pinyin;
            this.german = german;
            this.life = 300; // ~5 seconds at 60fps
            this.maxLife = 300;
            this.revealProgress = 0;
            this.inkDrops = [];
            // Position in world coords (top-right scroll area)
            this.wx = WORLD_W - 175;
            this.wy = 15;
            this.ww = 160;
            this.wh = 200;
            // Pre-render character to offscreen canvas
            this.offCanvas = document.createElement('canvas');
            this.offCanvas.width = 192;
            this.offCanvas.height = 192;
            this.offCtx = this.offCanvas.getContext('2d');
            this._renderCharacter();
            // Generate ink drops for decoration
            for (let i = 0; i < 6; i++) {
                this.inkDrops.push({
                    x: Math.random() * 0.8 + 0.1,
                    y: Math.random() * 0.8 + 0.1,
                    r: Math.random() * 2 + 0.5,
                    alpha: Math.random() * 0.15 + 0.05,
                    delay: Math.random() * 0.6,
                });
            }
        }

        _renderCharacter() {
            const c = this.offCtx;
            const s = 192;
            c.clearRect(0, 0, s, s);
            c.textAlign = 'center';
            c.textBaseline = 'middle';
            // Auto-scale font size based on character count
            const len = this.hanzi.length;
            let fontSize = len <= 1 ? 130 : len === 2 ? 85 : len === 3 ? 65 : Math.max(38, Math.floor(160 / len));
            // Measure and shrink further if needed
            c.font = `bold ${fontSize}px ${CJK_FONT}`;
            const measured = c.measureText(this.hanzi).width;
            if (measured > s * 0.9) {
                fontSize = Math.floor(fontSize * (s * 0.9) / measured);
                c.font = `bold ${fontSize}px ${CJK_FONT}`;
            }
            // Ink bleed: draw twice with offset
            c.fillStyle = INK_COLOR;
            c.globalAlpha = 0.25;
            c.fillText(this.hanzi, s / 2 + 1, s / 2 + 1);
            c.globalAlpha = 1.0;
            c.fillText(this.hanzi, s / 2, s / 2);
        }

        update(dt) {
            this.life -= dt;
            // Reveal: ramps 0→1 over first 60% of life
            const revealEnd = this.maxLife * 0.6;
            const elapsed = this.maxLife - this.life;
            this.revealProgress = Math.min(1, elapsed / revealEnd);
            return this.life > 0;
        }

        draw(ctx) {
            if (this.life <= 0) return;
            const s = canvasScale;
            // Fade in/out
            let alpha = 1;
            const elapsed = this.maxLife - this.life;
            if (elapsed < this.maxLife * 0.12) alpha = elapsed / (this.maxLife * 0.12);
            if (this.life < this.maxLife * 0.18) alpha = this.life / (this.maxLife * 0.18);

            ctx.save();
            ctx.globalAlpha = alpha * 0.95;

            const x = this.wx * s;
            const y = this.wy * s;
            const w = this.ww * s;
            const h = this.wh * s;

            // Parchment/rice paper background
            ctx.fillStyle = PARCHMENT_BG;
            ctx.strokeStyle = PARCHMENT_BORDER;
            ctx.lineWidth = 1.5 * s;
            roundRect(ctx, x, y, w, h, 4 * s);
            ctx.fill();
            ctx.stroke();

            // Subtle paper texture
            ctx.globalAlpha = alpha * 0.06;
            for (let i = 0; i < 8; i++) {
                const tx = x + w * (0.1 + Math.sin(i * 2.7) * 0.4 + 0.4);
                const ty = y + h * (0.1 + Math.cos(i * 1.9) * 0.35 + 0.35);
                ctx.beginPath();
                ctx.arc(tx, ty, (3 + i * 1.5) * s, 0, Math.PI * 2);
                ctx.fillStyle = '#c8a060';
                ctx.fill();
            }
            ctx.globalAlpha = alpha * 0.95;

            // Red seal stamp decoration (top-left corner)
            const sealX = x + 8 * s;
            const sealY = y + 6 * s;
            const sealSz = 14 * s;
            ctx.fillStyle = 'rgba(180,30,20,0.15)';
            ctx.fillRect(sealX, sealY, sealSz, sealSz);
            ctx.strokeStyle = 'rgba(180,30,20,0.3)';
            ctx.lineWidth = 0.8 * s;
            ctx.strokeRect(sealX, sealY, sealSz, sealSz);

            // Character area (centered in upper portion of parchment)
            const charAreaX = x + (w - 100 * s) / 2;
            const charAreaY = y + 20 * s;
            const charAreaW = 100 * s;
            const charAreaH = 100 * s;

            // Progressive brush reveal with clipping
            ctx.save();
            ctx.beginPath();
            const rp = this.revealProgress;

            if (rp < 0.25) {
                // Phase 1: Top-left vertical stroke downward
                const ph = rp / 0.25;
                const clipW = charAreaW * 0.4;
                const clipH = charAreaH * ph;
                this._brushClip(ctx, charAreaX, charAreaY, clipW, clipH, s);
            } else if (rp < 0.55) {
                // Phase 2: Expand rightward
                const ph = (rp - 0.25) / 0.3;
                const clipW = charAreaW * (0.4 + 0.6 * ph);
                const clipH = charAreaH * (0.6 + 0.2 * ph);
                this._brushClip(ctx, charAreaX, charAreaY, clipW, clipH, s);
            } else if (rp < 0.8) {
                // Phase 3: Fill bottom
                const ph = (rp - 0.55) / 0.25;
                const clipW = charAreaW;
                const clipH = charAreaH * (0.8 + 0.2 * ph);
                this._brushClip(ctx, charAreaX, charAreaY, clipW, clipH, s);
            } else {
                // Phase 4: Full character
                ctx.rect(charAreaX - 2 * s, charAreaY - 2 * s, charAreaW + 4 * s, charAreaH + 4 * s);
            }
            ctx.clip();

            // Draw the pre-rendered character
            ctx.drawImage(this.offCanvas, charAreaX, charAreaY, charAreaW, charAreaH);

            // Ink drops that appear during reveal
            for (const drop of this.inkDrops) {
                if (rp > drop.delay) {
                    ctx.globalAlpha = alpha * drop.alpha * Math.min(1, (rp - drop.delay) * 3);
                    ctx.beginPath();
                    ctx.arc(
                        charAreaX + drop.x * charAreaW,
                        charAreaY + drop.y * charAreaH,
                        drop.r * s, 0, Math.PI * 2
                    );
                    ctx.fillStyle = INK_COLOR;
                    ctx.fill();
                }
            }
            ctx.restore();

            // Pinyin below character
            ctx.globalAlpha = alpha * 0.9;
            ctx.font = `${Math.round(11 * s)}px ${CJK_FONT}`;
            ctx.fillStyle = '#4a3520';
            ctx.textAlign = 'center';
            ctx.fillText(this.pinyin, x + w / 2, y + 132 * s);

            // German translation
            ctx.font = `${Math.round(9 * s)}px ${CJK_FONT}`;
            ctx.fillStyle = '#7a6a55';
            ctx.fillText(this.german, x + w / 2, y + 150 * s);

            // Decorative line
            ctx.beginPath();
            ctx.moveTo(x + 15 * s, y + 170 * s);
            ctx.lineTo(x + w - 15 * s, y + 170 * s);
            ctx.strokeStyle = 'rgba(180,140,80,0.3)';
            ctx.lineWidth = 0.5 * s;
            ctx.stroke();

            ctx.restore();
        }

        _brushClip(ctx, bx, by, bw, bh, s) {
            // Create ragged brush-edge clipping path using overlapping circles
            ctx.rect(bx, by, bw - 4 * s, bh - 4 * s);
            // Ragged right edge
            const steps = 8;
            for (let i = 0; i <= steps; i++) {
                const cy = by + (bh - 4 * s) * (i / steps);
                const cx = bx + bw - 4 * s + (Math.sin(i * 2.3 + bw * 0.1) * 3) * s;
                ctx.moveTo(cx + 4 * s, cy);
                ctx.arc(cx, cy, 4 * s, 0, Math.PI * 2);
            }
            // Ragged bottom edge
            for (let i = 0; i <= steps; i++) {
                const cx = bx + (bw - 4 * s) * (i / steps);
                const cy = by + bh - 4 * s + (Math.cos(i * 1.7 + bh * 0.1) * 3) * s;
                ctx.moveTo(cx + 4 * s, cy);
                ctx.arc(cx, cy, 4 * s, 0, Math.PI * 2);
            }
        }
    }

    // ============================================================
    //  PROVERB OVERLAY (成语 chéngyǔ — milestone calligraphy)
    // ============================================================
    class ProverbOverlay {
        constructor(proverb) {
            this.chars = [...proverb.chars]; // Array of individual characters
            this.pinyin = proverb.pinyin;
            this.german = proverb.german;
            this.milestone = proverb.words;
            this.charCount = this.chars.length;
            // Timing: ~0.8s per char reveal + 3s hold + 2s fade
            this.revealPerChar = 48; // frames per character reveal
            this.holdTime = 180; // frames to hold fully revealed
            this.fadeOutTime = 120; // frames to fade out
            this.totalLife = this.charCount * this.revealPerChar + this.holdTime + this.fadeOutTime;
            this.life = this.totalLife;
            this.maxLife = this.totalLife;
            // Pre-render each character
            this.offCanvases = this.chars.map(ch => {
                const oc = document.createElement('canvas');
                oc.width = 96;
                oc.height = 96;
                const octx = oc.getContext('2d');
                octx.textAlign = 'center';
                octx.textBaseline = 'middle';
                octx.font = `bold 72px ${CJK_FONT}`;
                octx.fillStyle = INK_COLOR;
                octx.globalAlpha = 0.2;
                octx.fillText(ch, 49, 49);
                octx.globalAlpha = 1.0;
                octx.fillText(ch, 48, 48);
                return oc;
            });
        }

        update(dt) {
            this.life -= dt;
            return this.life > 0;
        }

        draw(ctx) {
            if (this.life <= 0) return;
            const s = canvasScale;
            const elapsed = this.maxLife - this.life;

            // Overall alpha: fade in first 60 frames, fade out last fadeOutTime frames
            let alpha = 1;
            if (elapsed < 60) alpha = elapsed / 60;
            if (this.life < this.fadeOutTime) alpha = this.life / this.fadeOutTime;

            ctx.save();

            // Semi-transparent backdrop
            ctx.globalAlpha = alpha * 0.55;
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, WORLD_W * s, WORLD_H * s);

            ctx.globalAlpha = alpha;

            // Silk banner background
            const charSize = 42 * s;
            const charGap = 6 * s;
            const totalCharsW = this.charCount * (charSize + charGap) - charGap;
            const bannerW = Math.min(totalCharsW + 60 * s, (WORLD_W - 40) * s);
            const bannerH = 160 * s;
            const bannerX = (WORLD_W * s - bannerW) / 2;
            const bannerY = (WORLD_H * s - bannerH) / 2 - 20 * s;

            // Banner fill
            ctx.fillStyle = PARCHMENT_BG;
            ctx.strokeStyle = '#b8863a';
            ctx.lineWidth = 2 * s;
            roundRect(ctx, bannerX, bannerY, bannerW, bannerH, 6 * s);
            ctx.fill();
            ctx.stroke();

            // Inner border
            ctx.strokeStyle = 'rgba(180,100,40,0.25)';
            ctx.lineWidth = 0.8 * s;
            roundRect(ctx, bannerX + 6 * s, bannerY + 6 * s, bannerW - 12 * s, bannerH - 12 * s, 3 * s);
            ctx.stroke();

            // Paper texture on banner
            ctx.globalAlpha = alpha * 0.04;
            for (let i = 0; i < 12; i++) {
                const tx = bannerX + bannerW * (0.05 + Math.sin(i * 3.1) * 0.45 + 0.45);
                const ty = bannerY + bannerH * (0.1 + Math.cos(i * 2.3) * 0.4 + 0.4);
                ctx.beginPath();
                ctx.arc(tx, ty, (4 + i * 1.2) * s, 0, Math.PI * 2);
                ctx.fillStyle = '#c8a060';
                ctx.fill();
            }
            ctx.globalAlpha = alpha;

            // Milestone label
            ctx.font = `${Math.round(7 * s)}px ${CJK_FONT}`;
            ctx.fillStyle = '#b8863a';
            ctx.textAlign = 'center';
            ctx.fillText(`${this.milestone} Woerter gelernt`, WORLD_W * s / 2, bannerY + 18 * s);

            // Draw characters sequentially
            const charsStartX = (WORLD_W * s - totalCharsW) / 2;
            const charsY = bannerY + 32 * s;

            for (let i = 0; i < this.charCount; i++) {
                const charElapsed = elapsed - i * this.revealPerChar;
                if (charElapsed <= 0) continue; // Not yet revealed

                const charProgress = Math.min(1, charElapsed / this.revealPerChar);
                const cx = charsStartX + i * (charSize + charGap);

                ctx.save();

                // Clip for progressive reveal (top-to-bottom sweep)
                ctx.beginPath();
                const revealH = charSize * charProgress;
                ctx.rect(cx - 2 * s, charsY - 2 * s, charSize + 4 * s, revealH + 4 * s);
                // Ragged bottom edge
                for (let j = 0; j < 5; j++) {
                    const bx = cx + charSize * (j / 4);
                    const by = charsY + revealH + Math.sin(j * 2.1 + i) * 3 * s;
                    ctx.moveTo(bx + 3 * s, by);
                    ctx.arc(bx, by, 3 * s, 0, Math.PI * 2);
                }
                ctx.clip();

                // Draw pre-rendered character
                ctx.globalAlpha = alpha;
                ctx.drawImage(this.offCanvases[i], cx, charsY, charSize, charSize);

                ctx.restore();
            }

            // Pinyin (below characters, appears after all revealed)
            const allRevealed = elapsed > this.charCount * this.revealPerChar;
            if (allRevealed) {
                const textAlpha = Math.min(1, (elapsed - this.charCount * this.revealPerChar) / 40);
                ctx.globalAlpha = alpha * textAlpha;
                ctx.font = `${Math.round(9 * s)}px ${CJK_FONT}`;
                ctx.fillStyle = '#5a4530';
                ctx.textAlign = 'center';
                ctx.fillText(this.pinyin, WORLD_W * s / 2, bannerY + 88 * s);

                // German translation
                ctx.font = `${Math.round(8 * s)}px ${CJK_FONT}`;
                ctx.fillStyle = '#7a6a55';
                ctx.fillText(this.german, WORLD_W * s / 2, bannerY + 104 * s);

                // Decorative divider
                ctx.beginPath();
                ctx.moveTo(bannerX + 30 * s, bannerY + 118 * s);
                ctx.lineTo(bannerX + bannerW - 30 * s, bannerY + 118 * s);
                ctx.strokeStyle = 'rgba(180,140,80,0.3)';
                ctx.lineWidth = 0.5 * s;
                ctx.stroke();

                // Source attribution
                ctx.font = `italic ${Math.round(6.5 * s)}px ${CJK_FONT}`;
                ctx.fillStyle = '#a09080';
                ctx.fillText('— Chinesisches Sprichwort', WORLD_W * s / 2, bannerY + 132 * s);
            }

            ctx.restore();
        }
    }

    // --- Calligraphy trigger functions ---
    function triggerCalligraphy(hanzi, pinyin, german) {
        // Queue words for sequential display (one at a time)
        calligraphyQueue.push({ hanzi, pinyin, german });
        // If nothing is currently showing, start immediately
        if (calligraphyOverlays.length === 0) {
            _advanceCalligraphyQueue();
        }
    }

    function _advanceCalligraphyQueue() {
        if (calligraphyQueue.length === 0) return;
        const next = calligraphyQueue.shift();
        calligraphyOverlays = [new CalligraphyOverlay(next.hanzi, next.pinyin, next.german)];
    }

    function checkProverbMilestone(wordCount) {
        for (const p of PROVERBS) {
            if (p.words === wordCount && !proverbMilestonesHit.has(p.words)) {
                proverbMilestonesHit.add(p.words);
                proverbOverlay = new ProverbOverlay(p);
                addLog(`Meilenstein: ${p.chars} — ${p.german}`, 'learn');
                sfx('learn');
                break;
            }
        }
    }

    // --- Consolidated learn-word helper ---
    function learnWord(learner, w) {
        learner.knownWords.add(w.conceptId);
        learner.wordHistory.push(w.conceptId);
        sfx('learn');
        learnFlashes.push(new LearnFlash(
            learner.x + randFloat(-10, 10), learner.y - 25,
            w.hanzi + ' (' + w.pinyin + ')'
        ));
        addLog(`${learner.name} lernt: ${w.hanzi} [${w.pinyin}] (${w.de})`, 'learn');
        triggerCalligraphy(w.hanzi, w.pinyin, w.de);
        checkProverbMilestone(learner.knownWords.size);
    }

    // ============================================================
    //  RENDERING
    // ============================================================
    function drawTerrain(ctx) {
        const cw = canvas.width / dpr;
        const ch = canvas.height / dpr;
        const s = canvasScale;

        // Base green landscape
        ctx.fillStyle = '#4a7a30';
        ctx.fillRect(0, 0, cw, ch);

        // Rolling green hills in background
        const hills = [
            { x: 80, y: 60, rx: 140, ry: 50, c: '#3e6e28' },
            { x: 350, y: 40, rx: 180, ry: 60, c: '#447228' },
            { x: 650, y: 50, rx: 120, ry: 45, c: '#3a6a24' },
            { x: 200, y: 80, rx: 100, ry: 35, c: '#4a7a30' },
        ];
        for (const h of hills) {
            ctx.beginPath();
            ctx.ellipse(h.x * s, h.y * s, h.rx * s, h.ry * s, 0, Math.PI, 0);
            ctx.fillStyle = h.c;
            ctx.fill();
        }

        // Golden-tan courtyard area (center, slightly irregular ellipse)
        ctx.beginPath();
        ctx.ellipse(420 * s, 300 * s, 180 * s, 120 * s, -0.06, 0, Math.PI * 2);
        ctx.fillStyle = '#c8b080';
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(418 * s, 302 * s, 160 * s, 105 * s, 0.04, 0, Math.PI * 2);
        ctx.fillStyle = '#baa870';
        ctx.fill();

        // Stone paths (slightly curved for organic feel)
        const paths = [
            // Main east-west path (gentle S-curve)
            { pts: [{x:190,y:305},{x:300,y:293},{x:420,y:302},{x:540,y:295},{x:650,y:300}], w: 18 },
            // North-south path (slight meander)
            { pts: [{x:415,y:145},{x:422,y:230},{x:418,y:310},{x:424,y:390},{x:420,y:480}], w: 16 },
            // Diagonal path (mild curve)
            { pts: [{x:275,y:198},{x:350,y:255},{x:420,y:300},{x:500,y:355},{x:560,y:400}], w: 14 },
            // Small garden path
            { pts: [{x:150,y:370},{x:210,y:348},{x:275,y:330},{x:320,y:312}], w: 10 },
            // Path to river
            { pts: [{x:575,y:298},{x:625,y:288},{x:670,y:290},{x:700,y:298}], w: 12 },
        ];

        for (const p of paths) {
            const pts = p.pts;
            const hw = p.w / 2;
            // Draw filled path with varying width
            ctx.fillStyle = '#9a9080';
            ctx.beginPath();
            // Forward edge
            for (let i = 0; i < pts.length; i++) {
                const prev = pts[Math.max(0, i - 1)];
                const next = pts[Math.min(pts.length - 1, i + 1)];
                const dx = next.x - prev.x;
                const dy = next.y - prev.y;
                const len = Math.sqrt(dx * dx + dy * dy) || 1;
                // Vary width slightly per point for organic feel
                const wVar = hw * (0.85 + Math.sin(i * 1.7) * 0.2);
                const nx = (-dy / len) * wVar;
                const ny = (dx / len) * wVar;
                if (i === 0) ctx.moveTo((pts[i].x + nx) * s, (pts[i].y + ny) * s);
                else ctx.lineTo((pts[i].x + nx) * s, (pts[i].y + ny) * s);
            }
            // Return edge (reverse)
            for (let i = pts.length - 1; i >= 0; i--) {
                const prev = pts[Math.max(0, i - 1)];
                const next = pts[Math.min(pts.length - 1, i + 1)];
                const dx = next.x - prev.x;
                const dy = next.y - prev.y;
                const len = Math.sqrt(dx * dx + dy * dy) || 1;
                const wVar = hw * (0.85 + Math.sin(i * 1.7) * 0.2);
                const nx = (-dy / len) * wVar;
                const ny = (dx / len) * wVar;
                ctx.lineTo((pts[i].x - nx) * s, (pts[i].y - ny) * s);
            }
            ctx.closePath();
            ctx.fill();

            // Softer edges (slight blur effect with semi-transparent wider path)
            ctx.globalAlpha = 0.15;
            ctx.fillStyle = '#8a7a60';
            ctx.beginPath();
            for (let i = 0; i < pts.length; i++) {
                const prev = pts[Math.max(0, i - 1)];
                const next = pts[Math.min(pts.length - 1, i + 1)];
                const dx = next.x - prev.x;
                const dy = next.y - prev.y;
                const len = Math.sqrt(dx * dx + dy * dy) || 1;
                const wVar = (hw + 3) * (0.9 + Math.sin(i * 2.1) * 0.15);
                const nx = (-dy / len) * wVar;
                const ny = (dx / len) * wVar;
                if (i === 0) ctx.moveTo((pts[i].x + nx) * s, (pts[i].y + ny) * s);
                else ctx.lineTo((pts[i].x + nx) * s, (pts[i].y + ny) * s);
            }
            for (let i = pts.length - 1; i >= 0; i--) {
                const prev = pts[Math.max(0, i - 1)];
                const next = pts[Math.min(pts.length - 1, i + 1)];
                const dx = next.x - prev.x;
                const dy = next.y - prev.y;
                const len = Math.sqrt(dx * dx + dy * dy) || 1;
                const wVar = (hw + 3) * (0.9 + Math.sin(i * 2.1) * 0.15);
                const nx = (-dy / len) * wVar;
                const ny = (dx / len) * wVar;
                ctx.lineTo((pts[i].x - nx) * s, (pts[i].y - ny) * s);
            }
            ctx.closePath();
            ctx.fill();
            ctx.globalAlpha = 1.0;
        }

        // Irregular paving stones along paths
        ctx.strokeStyle = '#8a8070';
        ctx.lineWidth = 0.5 * s;
        for (const p of paths) {
            const pts = p.pts;
            for (let seg = 0; seg < pts.length - 1; seg++) {
                const a = pts[seg], b = pts[seg + 1];
                const dx = b.x - a.x;
                const dy = b.y - a.y;
                const segLen = Math.sqrt(dx * dx + dy * dy);
                const steps = Math.floor(segLen / 11);
                for (let i = 1; i < steps; i++) {
                    const t = i / steps;
                    const px = (a.x + dx * t) * s;
                    const py = (a.y + dy * t) * s;
                    const len = segLen || 1;
                    const hw2 = (p.w / 2) * (0.8 + Math.sin((seg * 5 + i) * 1.3) * 0.2);
                    const nx = (-dy / len) * hw2 * s;
                    const ny = (dx / len) * hw2 * s;
                    ctx.beginPath();
                    ctx.moveTo(px + nx, py + ny);
                    ctx.lineTo(px - nx, py - ny);
                    ctx.stroke();
                }
            }
        }

        // River on right side (gentle meander)
        ctx.fillStyle = '#3a6a8a';
        ctx.beginPath();
        ctx.moveTo(725 * s, 0);
        ctx.bezierCurveTo(720 * s, 120 * s, 715 * s, 280 * s, 710 * s, 400 * s);
        ctx.bezierCurveTo(705 * s, 500 * s, 708 * s, 560 * s, 705 * s, ch);
        ctx.lineTo(800 * s, ch);
        ctx.bezierCurveTo(798 * s, 540 * s, 793 * s, 420 * s, 795 * s, 300 * s);
        ctx.bezierCurveTo(797 * s, 180 * s, 790 * s, 80 * s, 785 * s, 0);
        ctx.closePath();
        ctx.fill();
        // River ripples
        ctx.strokeStyle = 'rgba(100,170,220,0.3)';
        ctx.lineWidth = 1 * s;
        for (let i = 0; i < 12; i++) {
            const ry = (i * 50 + (gameTick * 0.5) % 50) * s;
            const rxOff = Math.sin(i * 0.7) * 4;
            ctx.beginPath();
            ctx.moveTo((712 + rxOff) * s, ry);
            ctx.quadraticCurveTo((742 + rxOff) * s, (ry + 8 * s), (775 + rxOff) * s, ry);
            ctx.stroke();
        }

        // Green grass patches
        const grassPatches = [
            { x: 100, y: 400, r: 80, c: '#508030' },
            { x: 600, y: 120, r: 60, c: '#4a7a2e' },
            { x: 150, y: 150, r: 70, c: '#467428' },
            { x: 550, y: 500, r: 90, c: '#4e7e32' },
        ];
        for (const gp of grassPatches) {
            ctx.beginPath();
            ctx.ellipse(gp.x * s, gp.y * s, gp.r * s, gp.r * 0.6 * s, 0, 0, Math.PI * 2);
            ctx.fillStyle = gp.c;
            ctx.fill();
        }

        // Bamboo shoots scattered (small green triangles)
        const bambooShoots = [
            [60, 180], [90, 420], [680, 100], [670, 480],
            [140, 520], [50, 350], [660, 250], [100, 100]
        ];
        ctx.fillStyle = '#3a8a3a';
        for (const [bx, by] of bambooShoots) {
            ctx.beginPath();
            ctx.moveTo(bx * s, by * s);
            ctx.lineTo((bx - 2) * s, (by + 10) * s);
            ctx.lineTo((bx + 2) * s, (by + 10) * s);
            ctx.closePath();
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo((bx + 1) * s, (by + 3) * s);
            ctx.lineTo((bx + 5) * s, (by + 1) * s);
            ctx.lineTo((bx + 4) * s, (by + 4) * s);
            ctx.closePath();
            ctx.fill();
        }
    }

    function drawObject(ctx, obj) {
        const x = obj.x * canvasScale;
        const y = obj.y * canvasScale;
        const w = obj.w * canvasScale;
        const h = obj.h * canvasScale;

        switch (obj.type) {
            case 'house': {
                // Song Dynasty wooden house with curved tiled roof
                // Wooden walls
                ctx.fillStyle = '#8B6914';
                ctx.fillRect(x - w/2 + 2*canvasScale, y - h/4, w - 4*canvasScale, h/2 + 4*canvasScale);
                // Wall wood grain
                ctx.strokeStyle = '#7a5a10';
                ctx.lineWidth = canvasScale * 0.5;
                for (let i = 0; i < 3; i++) {
                    const ly = y - h/4 + 4*canvasScale + i * h/6;
                    ctx.beginPath();
                    ctx.moveTo(x - w/2 + 4*canvasScale, ly);
                    ctx.lineTo(x + w/2 - 4*canvasScale, ly);
                    ctx.stroke();
                }
                // Red door
                ctx.fillStyle = '#a82020';
                ctx.fillRect(x - 4*canvasScale, y - h/4 + 6*canvasScale, 8*canvasScale, h/2 - 2*canvasScale);
                ctx.fillStyle = '#e8c020';
                ctx.beginPath();
                ctx.arc(x + 2*canvasScale, y + 2*canvasScale, 1.2*canvasScale, 0, Math.PI*2);
                ctx.fill();
                // Curved tiled roof (dark grey trapezoid with curve)
                ctx.fillStyle = '#3a3a3a';
                ctx.beginPath();
                ctx.moveTo(x - w/2 - 6*canvasScale, y - h/4 + 2*canvasScale);
                ctx.quadraticCurveTo(x - w/3, y - h/2 - 8*canvasScale, x, y - h/2 - 10*canvasScale);
                ctx.quadraticCurveTo(x + w/3, y - h/2 - 8*canvasScale, x + w/2 + 6*canvasScale, y - h/4 + 2*canvasScale);
                ctx.fill();
                // Roof ridge lines
                ctx.strokeStyle = '#2a2a2a';
                ctx.lineWidth = canvasScale * 0.7;
                for (let i = 1; i <= 3; i++) {
                    const ry = y - h/4 + 2*canvasScale - i * h/8;
                    ctx.beginPath();
                    ctx.moveTo(x - w/2 - 4*canvasScale + i*4*canvasScale, ry + i*2*canvasScale);
                    ctx.quadraticCurveTo(x, ry - 2*canvasScale, x + w/2 + 4*canvasScale - i*4*canvasScale, ry + i*2*canvasScale);
                    ctx.stroke();
                }
                break;
            }

            case 'teahouse': {
                // Wider open-front teahouse with red awning and steam
                // Back wall
                ctx.fillStyle = '#8B6914';
                ctx.fillRect(x - w/2, y - h/4, w, h/2 + 4*canvasScale);
                // Open front (darker interior)
                ctx.fillStyle = '#4a3a10';
                ctx.fillRect(x - w/2 + 2*canvasScale, y - h/4 + 2*canvasScale, w - 4*canvasScale, h/3);
                // Support posts
                ctx.fillStyle = '#6a4a1a';
                ctx.fillRect(x - w/2 + 1*canvasScale, y - h/4, 3*canvasScale, h/2 + 4*canvasScale);
                ctx.fillRect(x + w/2 - 4*canvasScale, y - h/4, 3*canvasScale, h/2 + 4*canvasScale);
                ctx.fillRect(x - 1.5*canvasScale, y - h/4, 3*canvasScale, h/2 + 4*canvasScale);
                // Red fabric awning
                ctx.fillStyle = '#c03020';
                ctx.beginPath();
                ctx.moveTo(x - w/2 - 4*canvasScale, y - h/4);
                ctx.lineTo(x - w/2 + 2*canvasScale, y - h/3 - 6*canvasScale);
                ctx.lineTo(x + w/2 - 2*canvasScale, y - h/3 - 6*canvasScale);
                ctx.lineTo(x + w/2 + 4*canvasScale, y - h/4);
                ctx.fill();
                // Awning drape scallops
                ctx.fillStyle = '#a82818';
                for (let i = 0; i < 4; i++) {
                    const sx = x - w/2 + i * w/3;
                    ctx.beginPath();
                    ctx.arc(sx + w/6, y - h/4 + 2*canvasScale, w/7, Math.PI, 0);
                    ctx.fill();
                }
                // Roof
                ctx.fillStyle = '#3a3a3a';
                ctx.beginPath();
                ctx.moveTo(x - w/2 - 6*canvasScale, y - h/3 - 4*canvasScale);
                ctx.quadraticCurveTo(x, y - h/2 - 12*canvasScale, x + w/2 + 6*canvasScale, y - h/3 - 4*canvasScale);
                ctx.fill();
                // Steam wisps (animated)
                const st = gameTick * 0.04;
                ctx.strokeStyle = 'rgba(220,220,220,0.3)';
                ctx.lineWidth = canvasScale * 1.2;
                for (let i = 0; i < 3; i++) {
                    const sx = x - 6*canvasScale + i * 6*canvasScale;
                    const sOff = Math.sin(st + i * 2) * 3 * canvasScale;
                    ctx.beginPath();
                    ctx.moveTo(sx, y - h/3 - 6*canvasScale);
                    ctx.quadraticCurveTo(sx + sOff, y - h/2 - 10*canvasScale, sx - sOff, y - h/2 - 18*canvasScale);
                    ctx.stroke();
                }
                break;
            }

            case 'market': {
                // Market stalls with red awnings and items
                // Counter/table
                ctx.fillStyle = '#7a5a2a';
                ctx.fillRect(x - w/2, y, w, h/4);
                // Items on counter
                ctx.fillStyle = '#d0a040';
                for (let i = 0; i < 4; i++) {
                    ctx.beginPath();
                    ctx.arc(x - w/3 + i * w/5, y - 2*canvasScale, 2.5*canvasScale, 0, Math.PI*2);
                    ctx.fill();
                }
                ctx.fillStyle = '#40a040';
                ctx.fillRect(x + w/5, y - 4*canvasScale, 6*canvasScale, 4*canvasScale);
                // Posts
                ctx.fillStyle = '#5a3a1a';
                ctx.fillRect(x - w/2, y - h/2, 3*canvasScale, h/2);
                ctx.fillRect(x + w/2 - 3*canvasScale, y - h/2, 3*canvasScale, h/2);
                // Red awning
                ctx.fillStyle = '#c03020';
                ctx.beginPath();
                ctx.moveTo(x - w/2 - 4*canvasScale, y - h/3);
                ctx.lineTo(x - w/2 + 3*canvasScale, y - h/2 - 2*canvasScale);
                ctx.lineTo(x + w/2 - 3*canvasScale, y - h/2 - 2*canvasScale);
                ctx.lineTo(x + w/2 + 4*canvasScale, y - h/3);
                ctx.fill();
                // Awning scallops
                ctx.fillStyle = '#a02818';
                for (let i = 0; i < 3; i++) {
                    const sx = x - w/2 + 2*canvasScale + i * (w - 4*canvasScale)/2.5;
                    ctx.beginPath();
                    ctx.arc(sx + w/6, y - h/3 + 2*canvasScale, w/7, Math.PI, 0);
                    ctx.fill();
                }
                break;
            }

            case 'well': {
                // Stone well with wooden frame and rope
                // Stone base (circular)
                ctx.fillStyle = '#7a7a6a';
                ctx.beginPath();
                ctx.ellipse(x, y + 2*canvasScale, w/3, h/5, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.strokeStyle = '#5a5a4a';
                ctx.lineWidth = 2*canvasScale;
                ctx.stroke();
                // Stone wall (cylinder effect)
                ctx.fillStyle = '#8a8a7a';
                ctx.fillRect(x - w/3, y - h/4, w*2/3, h/4 + 2*canvasScale);
                ctx.strokeStyle = '#6a6a5a';
                ctx.lineWidth = canvasScale;
                // Stone rows
                for (let i = 0; i < 3; i++) {
                    const sy = y - h/4 + i * h/10;
                    ctx.beginPath();
                    ctx.moveTo(x - w/3, sy);
                    ctx.lineTo(x + w/3, sy);
                    ctx.stroke();
                }
                // Top rim
                ctx.fillStyle = '#6a6a5a';
                ctx.beginPath();
                ctx.ellipse(x, y - h/4, w/3 + 2*canvasScale, h/7, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.strokeStyle = '#5a5a4a';
                ctx.stroke();
                // Dark water inside
                ctx.fillStyle = '#1a3a5a';
                ctx.beginPath();
                ctx.ellipse(x, y - h/4, w/3 - 2*canvasScale, h/8, 0, 0, Math.PI*2);
                ctx.fill();
                // Wooden frame above
                ctx.fillStyle = '#6a4a2a';
                ctx.fillRect(x - w/3 - 2*canvasScale, y - h/2 - 10*canvasScale, 3*canvasScale, h/3 + 6*canvasScale);
                ctx.fillRect(x + w/3 - 1*canvasScale, y - h/2 - 10*canvasScale, 3*canvasScale, h/3 + 6*canvasScale);
                // Cross beam
                ctx.fillRect(x - w/3 - 2*canvasScale, y - h/2 - 10*canvasScale, w*2/3 + 4*canvasScale, 3*canvasScale);
                // Rope
                ctx.strokeStyle = '#8a7a5a';
                ctx.lineWidth = canvasScale;
                ctx.beginPath();
                ctx.moveTo(x, y - h/2 - 8*canvasScale);
                ctx.lineTo(x, y - h/4 - 2*canvasScale);
                ctx.stroke();
                // Bucket
                ctx.fillStyle = '#5a4a2a';
                ctx.fillRect(x - 3*canvasScale, y - h/4 - 6*canvasScale, 6*canvasScale, 5*canvasScale);
                break;
            }

            case 'bridge': {
                // Arched stone bridge over water
                // Water underneath
                ctx.fillStyle = '#2a5a8a';
                ctx.fillRect(x - w/2 - 4*canvasScale, y + 2*canvasScale, w + 8*canvasScale, h/4);
                // Ripples on water
                const bwt = gameTick * 0.03;
                ctx.strokeStyle = 'rgba(100,180,220,0.3)';
                ctx.lineWidth = canvasScale;
                for (let i = 0; i < 3; i++) {
                    ctx.beginPath();
                    const rx = x - w/4 + i * w/4 + Math.sin(bwt + i)*3*canvasScale;
                    ctx.ellipse(rx, y + 4*canvasScale, 5*canvasScale, 1.5*canvasScale, 0, 0, Math.PI*2);
                    ctx.stroke();
                }
                // Stone arch
                ctx.fillStyle = '#8a8a7a';
                ctx.beginPath();
                ctx.moveTo(x - w/2, y + h/4 + 2*canvasScale);
                ctx.lineTo(x - w/2, y + 2*canvasScale);

                // Mooring post
                ctx.fillStyle = '#4a2a10';
                ctx.fillRect(x + w/2 - 4*canvasScale, y - h/3 - 4*canvasScale, 4*canvasScale, 8*canvasScale);
                // Rope
                ctx.strokeStyle = '#8a7a5a';
                ctx.lineWidth = canvasScale;
                ctx.beginPath();
                ctx.moveTo(x + w/2 - 2*canvasScale, y - h/3);
                ctx.quadraticCurveTo(x + w/2 + 4*canvasScale, y - h/4, x + w/2 - 2*canvasScale, y - h/6);
                ctx.stroke();
                break;
            }

            case 'lotus_pond': {
                // Blue oval with lotus flowers and lily pads
                // Water
                ctx.fillStyle = '#2a5a8a';
                ctx.beginPath();
                ctx.ellipse(x, y, w/2, h/2, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.strokeStyle = '#1a4a7a';
                ctx.lineWidth = 2*canvasScale;
                ctx.stroke();
                // Lily pads
                const lpPads = [[-10,-3],[8,4],[-4,6],[10,-5]];
                for (const [px,py] of lpPads) {
                    ctx.fillStyle = '#2a7a2a';
                    ctx.beginPath();
                    ctx.ellipse(x+px*canvasScale, y+py*canvasScale, 4*canvasScale, 3*canvasScale, 0.5, 0, Math.PI*2);
                    ctx.fill();
                }
                // Lotus flowers (pink)
                const lotusPos = [[-5,-5],[7,2]];
                for (let li = 0; li < lotusPos.length; li++) {
                    const [lx2, ly2] = lotusPos[li];
                    const lfx = x + lx2*canvasScale;
                    const lfy = y + ly2*canvasScale;
                    // Petals (5 around center)
                    for (let p = 0; p < 5; p++) {
                        const angle = p * Math.PI * 2 / 5 - Math.PI/2;
                        const px2 = lfx + Math.cos(angle) * 3*canvasScale;
                        const py2 = lfy + Math.sin(angle) * 3*canvasScale;
                        ctx.fillStyle = li === 0 ? '#e88090' : '#e890a0';
                        ctx.beginPath();
                        ctx.ellipse(px2, py2, 2.5*canvasScale, 1.5*canvasScale, angle, 0, Math.PI*2);
                        ctx.fill();
                    }
                    // Center
                    ctx.fillStyle = '#e8d040';
                    ctx.beginPath();
                    ctx.arc(lfx, lfy, 1.5*canvasScale, 0, Math.PI*2);
                    ctx.fill();
                }
                // Ripples
                const lpt = gameTick * 0.025;
                ctx.strokeStyle = 'rgba(100,180,220,0.25)';
                ctx.lineWidth = canvasScale;
                for (let i = 0; i < 2; i++) {
                    ctx.beginPath();
                    ctx.ellipse(x + Math.sin(lpt+i*2)*6*canvasScale, y + Math.cos(lpt+i*2)*3*canvasScale, 5*canvasScale, 2*canvasScale, 0, 0, Math.PI*2);
                    ctx.stroke();
                }
                break;
            }

            case 'flower': {
                // Cluster of colorful flowers
                const flowerColors = ['#e84060','#e8a020','#c060e0','#e86040','#e0e040'];
                for (let i = 0; i < 6; i++) {
                    const fx2 = x + (Math.cos(i*1.05) * 8)*canvasScale;
                    const fy2 = y + (Math.sin(i*1.05) * 6)*canvasScale;
                    // Stem
                    ctx.beginPath();
                    ctx.moveTo(fx2, fy2 + 6*canvasScale);
                    ctx.lineTo(fx2, fy2);
                    ctx.strokeStyle = '#3a7a2a';
                    ctx.lineWidth = canvasScale;
                    ctx.stroke();
                    // Petals
                    ctx.beginPath();
                    ctx.arc(fx2, fy2, 3*canvasScale, 0, Math.PI*2);
                    ctx.fillStyle = flowerColors[i % flowerColors.length];
                    ctx.fill();
                    // Center
                    ctx.beginPath();
                    ctx.arc(fx2, fy2, 1.2*canvasScale, 0, Math.PI*2);
                    ctx.fillStyle = '#e8d040';
                    ctx.fill();
                }
                break;
            }

            case 'willow': {
                // Willow tree with drooping branches
                // Trunk
                ctx.fillStyle = '#5a3a1a';
                ctx.fillRect(x - 4*canvasScale, y - 5*canvasScale, 8*canvasScale, 25*canvasScale);
                // Main branches (upward then drooping)
                ctx.strokeStyle = '#4a3018';
                ctx.lineWidth = 2*canvasScale;
                const branchAngles = [-0.8, -0.3, 0.2, 0.7];
                for (const a of branchAngles) {
                    const bx = x + Math.cos(a) * 8*canvasScale;
                    const by = y - 10*canvasScale + Math.sin(a) * 4*canvasScale;
                    ctx.beginPath();
                    ctx.moveTo(x, y - 5*canvasScale);
                    ctx.lineTo(bx, by);
                    ctx.stroke();
                }
                // Drooping branch lines (green)
                ctx.strokeStyle = '#3a8a2a';
                ctx.lineWidth = canvasScale * 0.8;
                for (let i = 0; i < 12; i++) {
                    const startX = x + (Math.cos(i * 0.55) * 12)*canvasScale;
                    const startY = y - 12*canvasScale + Math.sin(i * 0.8) * 3*canvasScale;
                    const endX = startX + (Math.cos(i * 0.55) * 6)*canvasScale;
                    const endY = startY + 18*canvasScale + Math.sin(i * 1.2) * 4*canvasScale;
                    const midX = (startX + endX)/2 + Math.sin(i) * 3*canvasScale;
                    ctx.beginPath();
                    ctx.moveTo(startX, startY);
                    ctx.quadraticCurveTo(midX, (startY + endY)/2, endX, endY);
                    ctx.stroke();
                    // Small leaves along droop
                    if (i % 2 === 0) {
                        ctx.fillStyle = '#4a9a3a';
                        ctx.beginPath();
                        ctx.ellipse(midX, (startY+endY)/2, 2*canvasScale, 1*canvasScale, i*0.3, 0, Math.PI*2);
                        ctx.fill();
                    }
                }
                // Canopy mass (light)
                ctx.fillStyle = 'rgba(60,140,50,0.25)';
                ctx.beginPath();
                ctx.arc(x, y - 10*canvasScale, 16*canvasScale, 0, Math.PI*2);
                ctx.fill();
                break;
            }
        }

        // Label
        ctx.font = `${Math.round(9*canvasScale)}px 'Microsoft YaHei','PingFang SC','Noto Sans SC',sans-serif`;
        ctx.fillStyle = 'rgba(200,190,160,0.6)';
        ctx.textAlign = 'center';
        ctx.fillText(obj.label, x, y + (h/2 + 14) * canvasScale);
    }

    function drawPerson(ctx, person) {
        const x = person.x * canvasScale;
        const y = person.y * canvasScale;
        const s = canvasScale;
        const facing = person.facing;
        const isMoving = person.state === 'moving' || (person.state === 'idle' && person.distTo(person.targetX, person.targetY) > 5);
        const walkCycle = isMoving ? Math.sin(gameTick * 0.15) : 0;
        const skin = person.skinTone;
        const cloth = person.clothColor;
        const isLearner = person.role === 'learner';

        ctx.save();
        ctx.translate(x, y);

        // Shadow
        ctx.beginPath();
        ctx.ellipse(0, 5*s, 10*s, 4*s, 0, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(0,0,0,0.2)';
        ctx.fill();

        // Feet / cloth shoes
        const legSpread = 4 * s;
        const leftLegOff = walkCycle * 3 * s;
        const rightLegOff = -walkCycle * 3 * s;
        ctx.fillStyle = isLearner ? '#4a3020' : '#2a2a2a';
        // Left foot
        ctx.save();
        ctx.translate(Math.cos(facing + 1.8) * legSpread, Math.sin(facing + 1.8) * legSpread);
        ctx.beginPath();
        ctx.ellipse(Math.cos(facing) * leftLegOff, Math.sin(facing) * leftLegOff, 3*s, 2.5*s, facing, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
        // Right foot
        ctx.save();
        ctx.translate(Math.cos(facing - 1.8) * legSpread, Math.sin(facing - 1.8) * legSpread);
        ctx.beginPath();
        ctx.ellipse(Math.cos(facing) * rightLegOff, Math.sin(facing) * rightLegOff, 3*s, 2.5*s, facing, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();

        // Body / robe (longer for Song Dynasty)
        ctx.beginPath();
        ctx.ellipse(0, -2*s, 9*s, 12*s, 0, 0, Math.PI*2);
        ctx.fillStyle = cloth;
        ctx.fill();
        ctx.strokeStyle = '#1a1a10';
        ctx.lineWidth = 0.6*s;
        ctx.stroke();

        // V-collar on robe
        ctx.strokeStyle = isLearner ? '#d0c8b0' : '#e8d8a0';
        ctx.lineWidth = 1*s;
        ctx.beginPath();
        const collarFwd = Math.cos(facing) * 4 * s;
        const collarSide = Math.sin(facing) * 4 * s;
        ctx.moveTo(Math.cos(facing + 0.8) * 6*s, Math.sin(facing + 0.8) * 6*s - 8*s);
        ctx.lineTo(collarFwd, collarSide - 2*s);
        ctx.lineTo(Math.cos(facing - 0.8) * 6*s, Math.sin(facing - 0.8) * 6*s - 8*s);
        ctx.stroke();

        // Belt / sash
        ctx.beginPath();
        ctx.ellipse(0, 2*s, 9*s, 2*s, 0, 0, Math.PI*2);
        ctx.fillStyle = isLearner ? '#6a4a2a' : '#8a6030';
        ctx.fill();

        // Arms with sleeves (wide sleeves for Chinese robe, narrower for learner)
        const armSwing = walkCycle * 2 * s;
        const sleeveW = isLearner ? 3.5*s : 5*s;
        const sleeveH = isLearner ? 5*s : 6*s;
        // Left arm
        ctx.save();
        ctx.translate(Math.cos(facing + 1.5) * 9*s, Math.sin(facing + 1.5) * 9*s);
        ctx.beginPath();
        ctx.ellipse(Math.cos(facing) * armSwing, Math.sin(facing) * armSwing - 3*s, sleeveW, sleeveH, facing + 0.3, 0, Math.PI*2);
        ctx.fillStyle = cloth;
        ctx.fill();
        ctx.strokeStyle = '#1a1a10';
        ctx.lineWidth = 0.4*s;
        ctx.stroke();
        // Hand
        ctx.beginPath();
        ctx.arc(Math.cos(facing) * (armSwing + 2*s), Math.sin(facing) * (armSwing + 2*s) - 3*s, 2*s, 0, Math.PI*2);
        ctx.fillStyle = skin;
        ctx.fill();
        ctx.restore();
        // Right arm
        ctx.save();
        ctx.translate(Math.cos(facing - 1.5) * 9*s, Math.sin(facing - 1.5) * 9*s);
        ctx.beginPath();
        ctx.ellipse(Math.cos(facing) * -armSwing, Math.sin(facing) * -armSwing - 3*s, sleeveW, sleeveH, facing - 0.3, 0, Math.PI*2);
        ctx.fillStyle = cloth;
        ctx.fill();
        ctx.strokeStyle = '#1a1a10';
        ctx.lineWidth = 0.4*s;
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(Math.cos(facing) * (-armSwing + 2*s), Math.sin(facing) * (-armSwing + 2*s) - 3*s, 2*s, 0, Math.PI*2);
        ctx.fillStyle = skin;
        ctx.fill();
        ctx.restore();

        // Head
        const headX = Math.cos(facing) * 3 * s;
        const headY = Math.sin(facing) * 3 * s - 12 * s;
        ctx.beginPath();
        ctx.arc(headX, headY, 6*s, 0, Math.PI*2);
        ctx.fillStyle = skin;
        ctx.fill();
        ctx.strokeStyle = '#1a1a10';
        ctx.lineWidth = 0.5*s;
        ctx.stroke();

        // Hair
        ctx.save();
        ctx.translate(headX, headY);
        ctx.fillStyle = '#1a1a1a';
        if (isLearner) {
            // German traveler: shorter hair, no topknot, maybe a cap
            ctx.beginPath();
            ctx.arc(0, -2*s, 6.5*s, Math.PI, 0);
            ctx.fill();
            // Simple cap/hat brim
            ctx.fillStyle = '#5a4030';
            ctx.beginPath();
            ctx.ellipse(0, -4*s, 8*s, 2*s, 0, Math.PI, 0);
            ctx.fill();
            ctx.fillStyle = '#6a5040';
            ctx.beginPath();
            ctx.arc(0, -5*s, 5*s, Math.PI, 0);
            ctx.fill();
        } else {
            // Chinese: black hair with topknot
            ctx.beginPath();
            ctx.arc(0, -2*s, 6.5*s, Math.PI, 0);
            ctx.fill();
            // Topknot (small bun on top)
            ctx.beginPath();
            ctx.arc(0, -8*s, 3*s, 0, Math.PI*2);
            ctx.fill();
            // Topknot pin (small line through bun)
            ctx.strokeStyle = '#8a7060';
            ctx.lineWidth = 0.8*s;
            ctx.beginPath();
            ctx.moveTo(-4*s, -8*s);
            ctx.lineTo(4*s, -8*s);
            ctx.stroke();
        }
        ctx.restore();

        // Eyes
        const eyeDist = 2.5 * s;
        const eyeFwd = 3 * s;
        const lEx = headX + Math.cos(facing) * eyeFwd + Math.cos(facing + 1.3) * eyeDist;
        const lEy = headY + Math.sin(facing) * eyeFwd + Math.sin(facing + 1.3) * eyeDist;
        const rEx = headX + Math.cos(facing) * eyeFwd + Math.cos(facing - 1.3) * eyeDist;
        const rEy = headY + Math.sin(facing) * eyeFwd + Math.sin(facing - 1.3) * eyeDist;
        ctx.fillStyle = '#1a1a10';
        ctx.beginPath();
        ctx.arc(lEx, lEy, 1.2*s, 0, Math.PI*2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(rEx, rEy, 1.2*s, 0, Math.PI*2);
        ctx.fill();

        // Sleeping indicator
        if (person.state === 'acting' && person.currentAction && (person.currentAction.id === 'sleep_house' || person.currentAction.id === 'sleep_self')) {
            const zt = gameTick * 0.04;
            ctx.font = `bold ${Math.round(12*s)}px 'Courier New','Microsoft YaHei','PingFang SC','Noto Sans SC',monospace`;
            ctx.fillStyle = `rgba(150,180,220,${0.5+Math.sin(zt)*0.3})`;
            ctx.textAlign = 'center';
            ctx.fillText('z Z', 14*s, (-24 + Math.sin(zt)*4)*s);
        }

        // Acting indicator
        if (person.state === 'acting' && person.currentAction && person.currentAction.id !== 'sleep_house' && person.currentAction.id !== 'sleep_self') {
            const at = gameTick * 0.08;
            const sparkX = Math.cos(at) * 12 * s;
            const sparkY = Math.sin(at * 1.3) * 8 * s - 6 * s;
            ctx.beginPath();
            ctx.arc(sparkX, sparkY, 1.5*s, 0, Math.PI*2);
            ctx.fillStyle = 'rgba(255,220,100,0.6)';
            ctx.fill();
        }

        ctx.restore();

        // Name label
        ctx.font = `bold ${Math.round(10*s)}px 'Courier New','Microsoft YaHei','PingFang SC','Noto Sans SC',monospace`;
        ctx.fillStyle = '#e0d8c0';
        ctx.textAlign = 'center';
        ctx.fillText(person.name, x, y + 20*s);
    }

    //  AI - SPEAKER (Person 1)
